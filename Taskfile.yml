version: "3"

tasks:
  setup:
    desc: Install all dependencies
    cmds:
      - bun install

  lint:
    desc: Run linter across all packages
    cmds:
      - bunx biome lint .

  format:
    desc: Run formatter across all packages
    cmds:
      - bunx biome format --write .

  typecheck:
    desc: Type-check all packages
    cmds:
      - bun run --filter="*" typecheck

  test:
    desc: Run all tests
    cmds:
      - bun test

  check-strings:
    desc: Scan entire repo for banned strings (confidential identifiers, client names)
    cmds:
      - bun plugins/shipwright/scripts/check-banned-strings.ts

  check-config-docs:
    desc: Verify all process.env.* vars in agent/src/ and plugins/shipwright/scripts/ are documented in docs/configuration.md
    cmds:
      - bun scripts/check-config-docs.ts

  ci:
    desc: Run all CI checks (lint → check-strings → typecheck → check-config-docs → test → secret-scan → doctor)
    cmds:
      - task: lint
      - task: check-strings
      - task: typecheck
      - task: check-config-docs
      - task: test
      - task: secret-scan
      - task: doctor

  api:
    desc: Start the metrics dashboard in offline mode → http://localhost:3460/dashboard
    env:
      METRICS_OFFLINE: "true"
    cmds:
      - bun metrics/src/server.ts

  ui:
    desc: Start the metrics dashboard in offline mode (alias for task api) → http://localhost:3460/dashboard
    env:
      METRICS_OFFLINE: "true"
    cmds:
      - bun metrics/src/server.ts

  dev:
    desc: Dev supervisor — starts metrics in offline mode; Ctrl-C kills all children → http://localhost:3460/dashboard
    cmds:
      - bun scripts/dev.ts

  stack:
    aliases: [stack:up]
    desc: Launch the full dev stack in a tmux session (5 panes — metrics :3460, admin :3001, agent :3000, chat REPL, logs). Requires tmux; falls back to `task dev`.
    cmds:
      - bun scripts/dev-tmux.ts

  stack:down:
    desc: Tear down the dev stack — kill the tmux session and stop/remove the agent Docker container (which `tmux kill-session` alone leaves running).
    cmds:
      - bun scripts/dev-tmux.ts --down

  db:provision:
    desc: Create the admin database (idempotent — safe to re-run)
    cmds:
      - |
        if [ -z "$DATABASE_URL_SHIPWRIGHT_ADMIN" ]; then
          echo "ERROR: DATABASE_URL_SHIPWRIGHT_ADMIN is not set. Export it before running db:provision."
          exit 1
        fi
        cd admin && bunx prisma migrate deploy --schema=prisma/schema.prisma

  db:migrate:
    desc: Generate and apply a new Prisma migration (dev only)
    cmds:
      - |
        if [ -z "$DATABASE_URL_SHIPWRIGHT_ADMIN" ]; then
          echo "ERROR: DATABASE_URL_SHIPWRIGHT_ADMIN is not set. Export it before running db:migrate."
          exit 1
        fi
        cd admin && bunx prisma migrate dev --schema=prisma/schema.prisma


  e2e:
    desc: Run metrics dashboard Playwright e2e tests (requires Playwright chromium installed)
    cmds:
      - cd metrics && bunx playwright test

  secret-scan:
    desc: Scan for accidentally committed secrets (gitleaks)
    cmds:
      - |
        if command -v gitleaks &>/dev/null; then
          gitleaks detect --source . --no-git --redact
        else
          echo "WARNING: gitleaks not installed locally — skipping secret scan. CI enforces this gate."
        fi

  pre-public:
    desc: Full pre-public audit gate (check-strings + secret-scan). Run before making the repo public.
    cmds:
      - task: check-strings
      - task: secret-scan

  doctor:
    desc: Validate task-store config and report active backend
    cmds:
      - bun plugins/shipwright/scripts/task_store.ts doctor
