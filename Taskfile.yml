version: "3"

tasks:
  setup:
    desc: Install all dependencies
    cmds:
      - bun install

  lint:
    desc: Run linter across all packages
    cmds:
      - bunx biome lint .

  format:
    desc: Run formatter across all packages
    cmds:
      - bunx biome format --write .

  typecheck:
    desc: Type-check all packages
    cmds:
      - bun run --filter="*" typecheck

  test:
    desc: Run all tests
    cmds:
      - bun test

  check-strings:
    desc: Check plugin for banned strings (confidential identifiers)
    cmds:
      - bun plugins/shipwright/scripts/check-banned-strings.ts

  ci:
    desc: Run all CI checks (lint → check-strings → typecheck → test → secret-scan → doctor)
    cmds:
      - task: lint
      - task: check-strings
      - task: typecheck
      - task: test
      - task: secret-scan
      - task: doctor

  db:provision:
    desc: Create the agent database (idempotent — safe to re-run)
    cmds:
      - |
        if [ -z "$DATABASE_URL_AGENT" ]; then
          echo "ERROR: DATABASE_URL_AGENT is not set. Export it before running db:provision."
          exit 1
        fi
        cd agent && bunx prisma migrate deploy --schema=prisma/schema.prisma

  db:migrate:
    desc: Generate and apply a new Prisma migration (dev only)
    cmds:
      - |
        if [ -z "$DATABASE_URL_AGENT" ]; then
          echo "ERROR: DATABASE_URL_AGENT is not set. Export it before running db:migrate."
          exit 1
        fi
        cd agent && bunx prisma migrate dev --schema=prisma/schema.prisma

  secret-scan:
    desc: Scan for accidentally committed secrets (gitleaks)
    cmds:
      - |
        if command -v gitleaks &>/dev/null; then
          gitleaks detect --source . --no-git --redact
        else
          echo "WARNING: gitleaks not installed locally — skipping secret scan. CI enforces this gate."
        fi

  e2e:
    desc: Run metrics dashboard e2e tests (Playwright)
    cmds:
      - cd metrics && bunx playwright test

  doctor:
    desc: Validate task-store config and report active backend
    cmds:
      - bun plugins/shipwright/scripts/task_store.ts doctor
