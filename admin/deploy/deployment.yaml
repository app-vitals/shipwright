# Shipwright Admin Service — GKE Deployment + Service
#
# Prerequisites:
#   1. Create the Kubernetes Secret referenced below:
#        kubectl create secret generic shipwright-admin-secret \
#          --from-literal=DATABASE_URL='postgres://...' \
#          --from-literal=SHIPWRIGHT_SESSION_SECRET='...' \
#          --from-literal=GOOGLE_CLIENT_ID='...' \
#          --from-literal=GOOGLE_CLIENT_SECRET='...' \
#          --from-literal=ADMIN_ALLOWED_EMAILS='admin@example.com' \
#          --from-literal=APP_BASE_URL='https://admin.example.com' \
#          --from-literal=SHIPWRIGHT_INTERNAL_API_KEY='...' \
#          --from-literal=SHIPWRIGHT_ENCRYPTION_KEY='...'
#
#   2. Replace <registry>/shipwright-admin:latest with your actual image reference.
#
#   3. Apply:
#        kubectl apply -f admin/deploy/deployment.yaml
#
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: shipwright-admin
  labels:
    app: shipwright-admin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shipwright-admin
  template:
    metadata:
      labels:
        app: shipwright-admin
    spec:
      containers:
        - name: shipwright-admin
          image: <registry>/shipwright-admin:latest
          ports:
            - containerPort: 3000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: shipwright-admin-secret
                  key: DATABASE_URL
            - name: SHIPWRIGHT_SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: shipwright-admin-secret
                  key: SHIPWRIGHT_SESSION_SECRET
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: shipwright-admin-secret
                  key: GOOGLE_CLIENT_ID
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: shipwright-admin-secret
                  key: GOOGLE_CLIENT_SECRET
            - name: ADMIN_ALLOWED_EMAILS
              valueFrom:
                secretKeyRef:
                  name: shipwright-admin-secret
                  key: ADMIN_ALLOWED_EMAILS
            - name: APP_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: shipwright-admin-secret
                  key: APP_BASE_URL
            - name: SHIPWRIGHT_INTERNAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: shipwright-admin-secret
                  key: SHIPWRIGHT_INTERNAL_API_KEY
            - name: SHIPWRIGHT_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: shipwright-admin-secret
                  key: SHIPWRIGHT_ENCRYPTION_KEY
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: shipwright-admin
  labels:
    app: shipwright-admin
spec:
  type: ClusterIP
  selector:
    app: shipwright-admin
  ports:
    - port: 80
      targetPort: 3000
      protocol: TCP
