name: Bug report
description: Report a problem with Shipwright Harness
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a report. Please don't include secrets, tokens, or proprietary code.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Which command did you run, against what kind of repo?
      placeholder: |
        1. Ran `/shipwright:...`
        2. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Shipwright (`shipwright` plugin) version
    validations:
      required: false
  - type: input
    id: claude-code-version
    attributes:
      label: Claude Code version
    validations:
      required: false
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS, and the target repo's toolchain (Node / Rust / Go / Python / Ruby / Make).
    validations:
      required: false
