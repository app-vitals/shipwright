name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Detects whether this run only touches the files auto-bump-chart.yml or
  # sync-plugin-version.yml commit — chart-version bumps (Chart.yaml,
  # CHANGELOG.md) and plugin-version syncs (package.json across workspaces,
  # plugin.json, marketplace.json, version.txt). Both are fully automated,
  # bot-authored, version-string-only changes that never touch application
  # logic — so the app/docker/site jobs below are gated on this and skipped
  # when nothing else changed. helm.yml (separately path-filtered on
  # charts/**) still runs and is what actually validates a chart change.
  #
  # Fails open on purpose: any inability to compute the diff (unresolvable
  # base ref, unexpected event shape) defaults `app=true`, running the full
  # suite. Silently skipping real tests on an error would be worse than
  # running them unnecessarily.
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.filter.outputs.app }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Determine whether app code changed
        id: filter
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            # push to main: each merge here is one squash commit, so the
            # parent is exactly "what main looked like before this merge."
            BASE="HEAD^"
            HEAD_SHA="HEAD"
          fi

          if ! git rev-parse --verify "$BASE" >/dev/null 2>&1; then
            echo "Could not resolve base ref '${BASE}' — running full suite to be safe."
            echo "app=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CHANGED=$(git diff --name-only "$BASE" "$HEAD_SHA")
          echo "Changed files (${BASE}...${HEAD_SHA}):"
          echo "$CHANGED"

          # Exact allowlist — the full set of files auto-bump-chart.yml and
          # sync-plugin-version.yml ever touch. Anything else in the diff
          # means real code changed, so the full suite runs.
          PATTERN='^(charts/shipwright/Chart\.yaml|charts/shipwright/CHANGELOG\.md|package\.json|plugins/shipwright/package\.json|plugins/shipwright/\.claude-plugin/plugin\.json|metrics/package\.json|agent/package\.json|version\.txt|\.claude-plugin/marketplace\.json)$'

          if [ -z "$CHANGED" ] || echo "$CHANGED" | grep -qvE "$PATTERN"; then
            echo "app=true" >> "$GITHUB_OUTPUT"
          else
            echo "app=false" >> "$GITHUB_OUTPUT"
            echo "Only automated chart/plugin-version-bump files changed — skipping app-level CI jobs."
          fi

  ci:
    name: lint / typecheck / test
    runs-on: ubuntu-latest
    needs: changes
    # always() so this still runs (fail-open) if the changes job itself
    # errored rather than auto-skipping every job in the suite.
    if: always() && (needs.changes.result != 'success' || needs.changes.outputs.app == 'true')
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: shipwright
          POSTGRES_PASSWORD: shipwright
          POSTGRES_DB: shipwright_admin_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # Admin and task-store integration tests (admin/src/*.integration.test.ts,
      # task-store/src/*.integration.test.ts) gate on the *_TEST vars below and
      # skip silently when absent.
      #
      # Every integration test's beforeEach spins up a brand-new PrismaClient
      # (its own pooled connection) and each afterEach disconnects it, so
      # connections don't accumulate across the suite. connection_limit still
      # bounds each client's own pool as a safety margin — Postgres's default
      # max_connections=100 comfortably covers that.
      #
      # Note: raising max_connections on the service container itself isn't
      # possible here — GitHub Actions' service `options:` are inserted into
      # `docker create` *before* the image name, so they can't carry postgres's
      # own `-c max_connections=...` server flag (and `-c` collides with
      # docker's `--cpu-shares` shorthand there anyway).
      DATABASE_URL_ADMIN_TEST: postgres://shipwright:shipwright@localhost:5432/shipwright_admin_test?connection_limit=5&pool_timeout=20
      DATABASE_URL_SHIPWRIGHT_TASK_STORE_TEST: postgres://shipwright:shipwright@localhost:5432/shipwright_task_store_test?connection_limit=5&pool_timeout=20
      # The schema.prisma files read the non-_TEST var names below (per their
      # own `datasource db { url = env(...) }` declarations), so `prisma migrate
      # deploy` needs these set to the same connection strings as the _TEST vars
      # above to sync schema against the right databases. Nothing else in this
      # job reads these two vars at runtime.
      DATABASE_URL_SHIPWRIGHT_ADMIN: postgres://shipwright:shipwright@localhost:5432/shipwright_admin_test
      DATABASE_URL_SHIPWRIGHT_TASK_STORE: postgres://shipwright:shipwright@localhost:5432/shipwright_task_store_test
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.x"

      - name: Install go-task
        uses: arduino/setup-task@v2
        with:
          version: 3.51.1

      - name: Install dependencies
        run: task setup

      - name: Lint
        run: task lint

      - name: Check banned strings
        run: task check-strings

      - name: Typecheck
        run: task typecheck

      - name: Check config docs
        run: task check-config-docs

      - name: Create task-store test database
        run: PGPASSWORD=shipwright psql -h localhost -U shipwright -d shipwright_admin_test -c "CREATE DATABASE shipwright_task_store_test;"

      - name: Sync test DB schema
        run: |
          bunx prisma migrate deploy --schema=admin/prisma/schema.prisma
          bunx prisma migrate deploy --schema=task-store/prisma/schema.prisma

      - name: Test
        run: task test:coverage

      - name: Secret scan
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v8.27.2/gitleaks_8.27.2_linux_x64.tar.gz" -o gitleaks.tar.gz
          echo "141c3b2dede46d8b3a53b47116da756bd223decc0374797559a6b50ecba5590c  gitleaks.tar.gz" | sha256sum -c
          tar -xz -f gitleaks.tar.gz gitleaks
          ./gitleaks detect --source . --no-git --redact


  site:
    name: site build / brand-lint / smoke
    runs-on: ubuntu-latest
    needs: changes
    if: always() && (needs.changes.result != 'success' || needs.changes.outputs.app == 'true')
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.x"

      - name: Install site dependencies
        run: cd site && bun install

      - name: Build site
        run: cd site && bunx astro build

      - name: Brand-lint built dist
        run: cd site && npm run brand-lint

      - name: Install Playwright chromium
        run: cd site && bunx playwright install --with-deps chromium

      - name: Playwright smoke
        run: cd site && bunx playwright test

  admin-docker-build:
    name: admin docker build
    runs-on: ubuntu-latest
    needs: changes
    if: always() && (needs.changes.result != 'success' || needs.changes.outputs.app == 'true')
    steps:
      - uses: actions/checkout@v4

      - name: Build admin Docker image
        run: docker build -f admin/Dockerfile -t shipwright-admin:ci .

  agent-docker-build:
    name: agent docker build
    runs-on: ubuntu-latest
    needs: changes
    if: always() && (needs.changes.result != 'success' || needs.changes.outputs.app == 'true')
    steps:
      - uses: actions/checkout@v4

      - name: Build agent Docker image
        run: docker build -f agent/Dockerfile -t shipwright-agent:ci .

  metrics-docker-build:
    name: metrics docker build
    runs-on: ubuntu-latest
    needs: changes
    if: always() && (needs.changes.result != 'success' || needs.changes.outputs.app == 'true')
    steps:
      - uses: actions/checkout@v4

      - name: Build metrics Docker image
        run: docker build -f metrics/Dockerfile -t shipwright-metrics:ci .

  e2e:
    name: e2e (metrics dashboard)
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.x"

      - name: Install go-task
        uses: arduino/setup-task@v2
        with:
          version: 3.51.1

      - name: Install dependencies
        run: task setup

      - name: Install Playwright chromium
        run: cd metrics && bunx playwright install --with-deps chromium

      - name: Run e2e tests
        run: task e2e
