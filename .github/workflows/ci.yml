name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    name: lint / typecheck / test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.x"

      - name: Install go-task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Install dependencies
        run: task setup

      - name: Lint
        run: task lint

      - name: Check banned strings
        run: task check-strings

      - name: Typecheck
        run: task typecheck

      - name: Test
        run: task test

  site:
    name: site build / brand-lint / smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.x"

      - name: Install site dependencies
        run: cd site && bun install

      - name: Build site
        run: cd site && bunx astro build

      - name: Brand-lint built dist
        run: cd site && npm run brand-lint

      - name: Install Playwright chromium
        run: cd site && bunx playwright install --with-deps chromium

      - name: Playwright smoke
        run: cd site && bunx playwright test
