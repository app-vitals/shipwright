name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    name: lint / typecheck / test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: metrics
          POSTGRES_PASSWORD: metrics
          POSTGRES_DB: metrics_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      METRICS_DATABASE_URL: postgres://metrics:metrics@localhost:5432/metrics_test
      # The Postgres integration tests gate on METRICS_TEST_POSTGRES_URL (postgres-provider.integration.test.ts);
      # without it the suite silently skips even though the postgres service is up.
      METRICS_TEST_POSTGRES_URL: postgres://metrics:metrics@localhost:5432/metrics_test
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.x"

      - name: Install go-task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Install dependencies
        run: task setup

      - name: Lint
        run: task lint

      - name: Check banned strings
        run: task check-strings

      - name: Typecheck
        run: task typecheck

      - name: Test
        run: task test

      - name: Secret scan
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v8.27.2/gitleaks_8.27.2_linux_x64.tar.gz" -o gitleaks.tar.gz
          echo "141c3b2dede46d8b3a53b47116da756bd223decc0374797559a6b50ecba5590c  gitleaks.tar.gz" | sha256sum -c
          tar -xz -f gitleaks.tar.gz gitleaks
          ./gitleaks detect --source . --no-git --redact

      - name: Task store doctor
        run: task doctor

  site:
    name: site build / brand-lint / smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.x"

      - name: Install site dependencies
        run: cd site && bun install

      - name: Build site
        run: cd site && bunx astro build

      - name: Brand-lint built dist
        run: cd site && npm run brand-lint

      - name: Install Playwright chromium
        run: cd site && bunx playwright install --with-deps chromium

      - name: Playwright smoke
        run: cd site && bunx playwright test

  admin-docker-build:
    name: admin docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build admin Docker image
        run: docker build -f admin/Dockerfile -t shipwright-admin:ci .

  e2e:
    name: e2e (metrics dashboard)
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.x"

      - name: Install go-task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Install dependencies
        run: task setup

      - name: Install Playwright chromium
        run: cd metrics && bunx playwright install --with-deps chromium

      - name: Run e2e tests
        run: task e2e
