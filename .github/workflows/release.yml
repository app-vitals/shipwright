name: Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Preview the next version and changelog without publishing tags or commits"
        type: boolean
        required: false
        default: false

jobs:
  guard:
    name: Admin check
    runs-on: ubuntu-latest
    steps:
      - name: Assert actor is admin
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PERMISSION=$(gh api repos/${{ github.repository }}/collaborators/${{ github.actor }}/permission --jq '.permission')
          if [ "$PERMISSION" != "admin" ]; then
            echo "Error: ${{ github.actor }} is not a repo admin (got: $PERMISSION)" >&2
            exit 1
          fi

  release:
    name: semantic-release
    runs-on: ubuntu-latest
    needs: guard
    steps:
      - uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1.12.0
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.x"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Release (dry run)
        if: ${{ inputs.dry_run }}
        run: bunx semantic-release --dry-run
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Release
        if: ${{ !inputs.dry_run }}
        run: bunx semantic-release
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
