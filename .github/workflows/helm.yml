name: Helm

# Isolated from ci.yml (bun lint/typecheck/test). This workflow only gates the
# Helm chart: fast no-cluster checks on every PR, plus a kind-based `ct install`
# end-to-end job. Both jobs block merge on failure.
on:
  pull_request:
    paths:
      - "charts/**"
      - "ct.yaml"
      - ".github/workflows/helm.yml"
  push:
    branches: [main]
    paths:
      - "charts/**"
      - "ct.yaml"
      - ".github/workflows/helm.yml"

permissions:
  contents: read

jobs:
  # Fast, no-cluster gate: lint + unit tests + schema validation.
  helm-checks:
    name: helm lint / unittest / validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # ct --check-version-increment diffs against target-branch

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          # helm-unittest v1.x's plugin.yaml uses the `platformHooks` schema
          # field, which Helm only understands from v3.18 onward. Keep this in
          # step with the --version pin below.
          version: v3.18.6

      - name: Install helm-unittest plugin
        run: helm plugin install https://github.com/helm-unittest/helm-unittest --version v1.1.1

      - name: Install kubeconform
        uses: bmuschko/setup-kubeconform@v1
        with:
          kubeconform-version: 0.6.7

      - name: Set up chart-testing
        # Installs the `ct` binary plus its yamllint + yamale dependencies.
        uses: helm/chart-testing-action@v2
        with:
          version: v3.12.0

      - name: helm lint
        run: helm lint charts/shipwright

      - name: ct lint (enforces chart version-increment)
        # Fails any PR that modifies charts/shipwright/** without bumping
        # Chart.yaml `version`. NOTE: the version-increment check only fires in
        # ct's *changed-chart detection* mode — passing `--charts` would bypass
        # detection and silently skip the bump check. So we rely on `chart-dirs`
        # + `target-branch` from ct.yaml to let ct diff against main itself.
        run: ct lint --config ct.yaml --check-version-increment --target-branch main

      - name: helm unittest
        run: helm unittest charts/shipwright

      - name: kubeconform validate (strict, k8s + CRD schemas)
        run: |
          helm template shipwright charts/shipwright --namespace shipwright \
            | kubeconform \
                -strict \
                -summary \
                -schema-location default \
                -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json'

  # End-to-end gate: spin a kind cluster and `ct install` the chart per ci/ values
  # variant, running `helm test` against each install.
  helm-e2e:
    name: ct install (kind)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # ct needs full history to diff against target-branch

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.18.6

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2
        with:
          version: v3.12.0

      - name: Create kind cluster
        # cluster_name is pinned to "kind" — the `kind load` step below
        # side-loads the admin image into THAT cluster.
        uses: helm/kind-action@v1
        with:
          version: v0.24.0
          cluster_name: kind

      # The admin Deployment runs the first-party `shipwright-admin` image, which
      # is NOT published to any registry at PR time. Build the REAL image and
      # side-load it into the kind cluster so `ct install` schedules the actual
      # workload (not a stub): the admin pod boots, runs `prisma migrate deploy`
      # against the bundled PostgreSQL subchart, and serves its DB-independent
      # /health probe — so `ct install --wait` sees it reach Ready. The ci/ values
      # set admin.image.pullPolicy: Never, so kind uses this loaded image and
      # never reaches a registry. Tag 0.1.0 = Chart.yaml appVersion.
      - name: Build admin image
        run: docker build -t shipwright-admin:0.1.0 -f admin/Dockerfile .

      - name: Load admin image into kind
        run: kind load docker-image shipwright-admin:0.1.0 --name kind

      # The metrics Deployment runs the first-party `shipwright-metrics` image,
      # which is also NOT published at PR time. Build the REAL image and side-load
      # it into kind so `ct install` schedules the actual metrics workload: the
      # pod boots in postgres mode against the bundled PostgreSQL subchart,
      # bootstraps its own `events` table, and serves the DB-independent /health
      # probe — so `ct install --wait` sees it reach Ready. The ci/ values set
      # metrics.image.pullPolicy: Never, so kind uses this loaded image and never
      # reaches a registry. Tag 0.1.0 = Chart.yaml appVersion.
      - name: Build metrics image
        run: docker build -t shipwright-metrics:0.1.0 -f metrics/Dockerfile .

      - name: Load metrics image into kind
        run: kind load docker-image shipwright-metrics:0.1.0 --name kind

      - name: ct install (per ci/ values variant, runs helm test)
        run: ct install --config ct.yaml --charts charts/shipwright
