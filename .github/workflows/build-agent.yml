name: Build and Push Agent Image

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write
  id-token: write

jobs:
  filter:
    name: filter changed paths
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.filter.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Resolve base SHA
        id: base
        run: echo "sha=$(git rev-parse ${{ github.event.workflow_run.head_sha }}~1)" >> "$GITHUB_OUTPUT"

      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          base: ${{ steps.base.outputs.sha }}
          ref: ${{ github.event.workflow_run.head_sha }}
          filters: |
            changed:
              - "agent/**"
              - "plugins/**"
              - ".claude-plugin/**"
              - "package.json"
              - "bun.lock"
              - ".github/workflows/build-agent.yml"

  build-and-push:
    name: build / tag / push
    needs: filter
    if: needs.filter.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Compute next tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.DISPATCH_TOKEN }}
          tag_prefix: "agent-v"
          default_bump: patch
          fetch_all_tags: true
          dry_run: true

      # Bare semver off the tag (agent-v0.117.0 → 0.117.0), stamped into the
      # image at build time below so the deployed artifact's plugin.json
      # always matches the tag it was built for — see agent/Dockerfile's
      # "sync plugin version" step. This does not touch git; the git-committed
      # version (needed for the public plugin marketplace listing) is synced
      # asynchronously by .github/workflows/sync-plugin-version.yml, which
      # this same tag also triggers.
      - name: Parse bare version from tag
        id: version
        run: |
          TAG="${{ steps.tag.outputs.new_tag }}"
          echo "version=${TAG#agent-v}" >> "$GITHUB_OUTPUT"

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ secrets.ARTIFACT_REGISTRY_HOST }} --quiet

      - name: Build Docker image
        run: |
          docker build \
            -f agent/Dockerfile \
            --build-arg AGENT_VERSION=${{ steps.version.outputs.version }} \
            -t ${{ secrets.ARTIFACT_REGISTRY_REPO }}/shipwright-agent:${{ steps.tag.outputs.new_tag }} \
            .

      - name: Push Docker image
        run: |
          docker push ${{ secrets.ARTIFACT_REGISTRY_REPO }}/shipwright-agent:${{ steps.tag.outputs.new_tag }}

      - name: Tag release
        # Only create the git tag once the image has actually pushed. A tag with
        # no image behind it silently breaks any downstream consumer that trusts
        # the tag without verifying the image exists — including the dispatch
        # below, which downstream repos use to pick up "the latest agent tag".
        env:
          GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
        run: |
          gh api "repos/${{ github.repository }}/git/refs" \
            -f ref="refs/tags/${{ steps.tag.outputs.new_tag }}" \
            -f sha="${{ github.event.workflow_run.head_sha }}"

      - name: Dispatch agent-released to downstream
        env:
          GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
          NEW_TAG: ${{ steps.tag.outputs.new_tag }}
          DISPATCH_REPO: ${{ vars.CHART_DISPATCH_REPO }}
        run: |
          [ -z "$DISPATCH_REPO" ] && echo "CHART_DISPATCH_REPO not configured, skipping" && exit 0
          printf '{"event_type":"shipwright-agent-released","client_payload":{"base_tag":"%s"}}' "$NEW_TAG" \
            | gh api "repos/$DISPATCH_REPO/dispatches" --method POST --input -
          echo "Dispatched shipwright-agent-released with base_tag: ${NEW_TAG}"
