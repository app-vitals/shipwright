name: Build and Push Agent Image

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write
  packages: write

jobs:
  filter:
    name: filter changed paths
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.filter.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Resolve base SHA
        id: base
        run: echo "sha=$(git rev-parse ${{ github.event.workflow_run.head_sha }}~1)" >> "$GITHUB_OUTPUT"

      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          base: ${{ steps.base.outputs.sha }}
          ref: ${{ github.event.workflow_run.head_sha }}
          filters: |
            changed:
              - "agent/**"
              - "plugins/**"
              - ".claude-plugin/**"
              - "package.json"
              - "bun.lock"
              - ".github/workflows/build-agent.yml"

  build-and-push:
    name: build / tag / push
    needs: filter
    if: needs.filter.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Compute next tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.DISPATCH_TOKEN }}
          tag_prefix: "agent-v"
          default_bump: patch
          fetch_all_tags: true
          dry_run: true

      # Bare semver off the tag (agent-v0.117.0 → 0.117.0), stamped into the
      # image at build time below so the deployed artifact's plugin.json
      # always matches the tag it was built for — see agent/Dockerfile's
      # "sync plugin version" step. This does not touch git; the git-committed
      # version (needed for the public plugin marketplace listing) is synced
      # asynchronously by .github/workflows/sync-plugin-version.yml, which
      # this same tag also triggers.
      - name: Parse bare version from tag
        id: version
        run: |
          TAG="${{ steps.tag.outputs.new_tag }}"
          echo "version=${TAG#agent-v}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            -f agent/Dockerfile \
            --build-arg AGENT_VERSION=${{ steps.version.outputs.version }} \
            --label org.opencontainers.image.source=https://github.com/app-vitals/shipwright \
            -t ghcr.io/app-vitals/shipwright-agent:${{ steps.tag.outputs.new_tag }} \
            .

      - name: Push Docker image
        run: |
          docker push ghcr.io/app-vitals/shipwright-agent:${{ steps.tag.outputs.new_tag }}

      - name: Tag release
        # Only create the git tag once the image has actually pushed. A tag with
        # no image behind it silently breaks any downstream consumer that trusts
        # the tag without verifying the image exists.
        env:
          GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
        run: |
          gh api "repos/${{ github.repository }}/git/refs" \
            -f ref="refs/tags/${{ steps.tag.outputs.new_tag }}" \
            -f sha="${{ github.event.workflow_run.head_sha }}"
