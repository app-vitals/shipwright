name: Build and Push Task-Store Image

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write
  packages: write

jobs:
  filter:
    name: filter changed paths
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.filter.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Resolve base SHA
        id: base
        run: echo "sha=$(git rev-parse ${{ github.event.workflow_run.head_sha }}~1)" >> "$GITHUB_OUTPUT"

      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          base: ${{ steps.base.outputs.sha }}
          ref: ${{ github.event.workflow_run.head_sha }}
          filters: |
            changed:
              - "task-store/**"
              - "lib/**"
              - "package.json"
              - "bun.lock"
              - ".github/workflows/build-task-store.yml"

  build-and-push:
    name: build / tag / push
    needs: filter
    if: needs.filter.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Compute next tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.DISPATCH_TOKEN }}
          tag_prefix: "task-store-v"
          default_bump: patch
          fetch_all_tags: true
          dry_run: true

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            -f task-store/Dockerfile \
            --label org.opencontainers.image.source=https://github.com/app-vitals/shipwright \
            -t ghcr.io/app-vitals/shipwright-task-store:${{ steps.tag.outputs.new_tag }} \
            .

      - name: Push Docker image
        run: |
          docker push ghcr.io/app-vitals/shipwright-task-store:${{ steps.tag.outputs.new_tag }}

      - name: Tag release
        # Only create the git tag once the image has actually pushed. A tag with
        # no image behind it (as happened when this step ran before the build)
        # silently breaks any downstream consumer that trusts the tag without
        # verifying the image exists.
        env:
          GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
        run: |
          gh api "repos/${{ github.repository }}/git/refs" \
            -f ref="refs/tags/${{ steps.tag.outputs.new_tag }}" \
            -f sha="${{ github.event.workflow_run.head_sha }}"
