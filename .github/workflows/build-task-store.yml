name: Build and Push Task-Store Image

on:
  push:
    branches: [main]
    paths:
      - "task-store/**"
      - "lib/**"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/build-task-store.yml"

permissions:
  contents: write
  id-token: write

jobs:
  build-and-push:
    name: build / tag / push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate app token for tag push
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Bump version and push tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ steps.app-token.outputs.token }}
          tag_prefix: "task-store-v"
          default_bump: patch
          fetch_all_tags: true

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ secrets.ARTIFACT_REGISTRY_HOST }} --quiet

      - name: Build Docker image
        run: |
          docker build \
            -f task-store/Dockerfile \
            -t ${{ secrets.ARTIFACT_REGISTRY_REPO }}/shipwright-task-store:${{ steps.tag.outputs.new_tag }} \
            .

      - name: Push Docker image
        run: |
          docker push ${{ secrets.ARTIFACT_REGISTRY_REPO }}/shipwright-task-store:${{ steps.tag.outputs.new_tag }}
