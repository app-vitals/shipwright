name: Auto-Bump Chart Version

# Triggers whenever an image-build tag is pushed for any of the Shipwright
# services. Each build workflow (build-agent.yml, build-admin.yml,
# build-metrics.yml, build-task-store.yml, build-chat.yml) creates a tag like
# agent-v*, admin-v*, metrics-v*, task-store-v*, or chat-v* on main after a
# successful image push. This workflow detects those tags, pins each
# released tag into the matching charts/shipwright/values.yaml image
# default(s), and opens a chart-version bump PR so no manual bump-chart.sh
# invocation is needed.
#
# Debounce: services release independently, so it's common for two or three
# tags to land within seconds/minutes of each other (e.g. admin-v0.156.0
# immediately followed by agent-v0.144.0). Bumping the chart once per tag in
# that situation produces a chart-bump PR/merge/publish cycle per tag for what
# is really one release event — multiplying merge noise and Deploy runs for no
# added safety. The `debounce` job absorbs bursts: it sleeps for
# DEBOUNCE_SECONDS, and its `chart-bump-debounce` concurrency group
# (cancel-in-progress: true) means a newer tag arriving during that sleep
# cancels the older run outright — only the *last* tag in a burst survives to
# reach the `bump-chart` job. `bump-chart` then credits every release tag that
# landed since the previous chart-bump commit (not just its own triggering
# tag) so the batch is still fully traceable, just collapsed into a single
# version bump.
#
# Known limitation: if tags land continuously faster than DEBOUNCE_SECONDS
# apart, no run ever clears the debounce window and no bump lands. This is an
# accepted tradeoff — release cadence here is a handful of tags a day, not a
# continuous stream. If that changes, add a max-wait fallback.
#
# Flow:
#   tag push (agent-v* / admin-v* / metrics-v* / task-store-v* / chat-v*)
#     → debounce job: sleep DEBOUNCE_SECONDS
#       → superseded by a newer tag push? cancelled, bump-chart never runs.
#       → quiet period elapsed? proceeds to bump-chart.
#     → bump-chart job
#       → collect every release tag pushed since the last chart-bump commit
#       → bump patch version in Chart.yaml once for the whole batch
#       → pin each batched tag's highest semver into its values.yaml
#         image.tag path(s) (admin/metrics/agent+provisioning/taskStore/chat)
#       → open PR (chore/chart-v{new_version}) crediting all batched tags and
#         listing exactly which values.yaml path(s) were pinned
#       → wait for required checks, then merge (squash)
#     → PR merges to main
#       → chart-release.yml triggers (paths: charts/shipwright/**)
#         → packages the chart + commits .tgz + index.yaml to gh-pages
#
# Manual test plan (cannot be tested in CI without real tags + secrets):
#   1. Push two dummy tags a few seconds apart to simulate a burst:
#        git tag agent-v9.9.8 && git push origin agent-v9.9.8
#        git tag admin-v9.9.9 && git push origin admin-v9.9.9
#   2. Observe the first run's `debounce` job gets cancelled (superseded) and
#      only the second run's `debounce` job completes and proceeds.
#   3. Observe `bump-chart` opens exactly one PR, and its body/CHANGELOG entry
#      credits both agent-v9.9.8 and admin-v9.9.9.
#   4. Verify the PR merges once checks pass, and chart-release.yml fires
#      exactly once.
#   5. Delete the dummy tags to clean up:
#        git push origin --delete agent-v9.9.8 admin-v9.9.9
#
# Logic tests live in .github/workflows/test-auto-bump-chart.sh.
# Run locally: bash .github/workflows/test-auto-bump-chart.sh

on:
  push:
    tags:
      - "admin-v*"
      - "metrics-v*"
      - "agent-v*"
      - "task-store-v*"
      - "chat-v*"

permissions:
  contents: write      # push branch + commit
  pull-requests: write # open PR + enable auto-merge

jobs:
  # Absorbs bursts of near-simultaneous release tags into a single downstream
  # bump. Deliberately does no repo work itself — cancellation here must never
  # leave a half-done Chart.yaml/branch/PR behind, so all mutating work lives
  # in bump-chart, which only ever starts after a debounce job actually
  # completes (not merely starts).
  debounce:
    name: debounce burst of release tags
    runs-on: ubuntu-latest
    concurrency:
      group: chart-bump-debounce
      cancel-in-progress: true
    steps:
      - name: Wait for quiet period
        env:
          DEBOUNCE_SECONDS: 90
        run: |
          echo "Tag ${GITHUB_REF_NAME} landed — waiting ${DEBOUNCE_SECONDS}s for other releases to land before bumping the chart."
          sleep "${DEBOUNCE_SECONDS}"
          echo "Quiet period elapsed with no superseding tag — proceeding to bump-chart."

  bump-chart:
    name: bump chart version
    needs: debounce
    runs-on: ubuntu-latest
    # Separate from the debounce group and still queued (not cancelled): once
    # we're doing real repo mutation, a run must always finish rather than be
    # cancelled mid-PR/mid-merge. This is only a safety net for the rare case
    # where two debounce windows resolve close together — the common case is
    # exactly one bump-chart run per burst.
    concurrency:
      group: chart-bump
      cancel-in-progress: false
    steps:
      # Check out main (not the tag's commit) so we always bump from the
      # latest chart version on main rather than whatever state the tag points at.
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main
          fetch-depth: 0

      - name: Configure Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # Credit every release tag that landed since the last chart-bump commit,
      # not just the tag that happened to trigger this run — that's everything
      # the debounce window batched together. Falls back to the triggering tag
      # alone if no prior bump commit exists (e.g. first-ever bump).
      - name: Collect release tags in this batch
        id: batch
        run: |
          PATTERNS=("agent-v*" "admin-v*" "metrics-v*" "task-store-v*" "chat-v*")

          LAST_BUMP_SHA=$(git log -1 --format=%H --grep='^chore(chart): bump chart version' -- charts/shipwright/Chart.yaml || true)

          SINCE=""
          if [ -n "$LAST_BUMP_SHA" ]; then
            SINCE=$(git log -1 --format=%cI "$LAST_BUMP_SHA")
          fi

          TAGS=()
          if [ -n "$SINCE" ]; then
            for PATTERN in "${PATTERNS[@]}"; do
              while IFS= read -r LINE; do
                [ -z "$LINE" ] && continue
                TAGS+=("$LINE")
              done < <(git for-each-ref "refs/tags/${PATTERN}" \
                --format='%(creatordate:iso-strict)|%(refname:short)' \
                | awk -F'|' -v since="$SINCE" '$1 > since { print $2 }')
            done
          fi

          # Always include the triggering tag even if it fell outside the
          # window (clock skew, first-ever bump) — never silently drop the
          # tag that fired this run.
          TRIGGER="${GITHUB_REF_NAME}"
          FOUND=false
          for T in "${TAGS[@]:-}"; do
            [ "$T" = "$TRIGGER" ] && FOUND=true
          done
          if [ "$FOUND" = "false" ]; then
            TAGS+=("$TRIGGER")
          fi

          TAGS_CSV=$(printf '%s\n' "${TAGS[@]}" | sort -u | paste -sd, -)

          echo "tags=${TAGS_CSV}" >> "$GITHUB_OUTPUT"
          echo "Batched tags for this bump: ${TAGS_CSV}"

      # Read the current chart version using grep+sed — avoids a yq dependency.
      # The version line in Chart.yaml is always "version: X.Y.Z" (no spaces
      # before the key, plain value — no quoting).
      - name: Read current chart version
        id: current
        run: |
          VERSION=$(grep '^version:' charts/shipwright/Chart.yaml | sed 's/^version: //')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Current chart version: ${VERSION}"

      # Increment the patch component only. Chart version bumps are always
      # patch-level here — minor/major bumps remain a manual step. One bump
      # covers the whole batch of tags collected above, however many landed.
      - name: Compute new chart version
        id: new
        run: |
          CURRENT="${{ steps.current.outputs.version }}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          PATCH=$(( PATCH + 1 ))
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          BRANCH="chore/chart-v${NEW_VERSION}"
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "branch=${BRANCH}"       >> "$GITHUB_OUTPUT"
          echo "New chart version: ${NEW_VERSION} (branch: ${BRANCH})"

      # Idempotency guard: if the branch for this exact chart version already
      # exists on the remote, a prior run already opened the bump PR — skip.
      # With debounce collapsing bursts into a single bump-chart run, this is
      # now only a safety net for the rare case of two debounce windows
      # resolving close together, not the common path.
      - name: Check for existing bump branch
        id: idempotency
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ steps.new.outputs.branch }}"
          if git ls-remote --heads origin "$BRANCH" | grep -q .; then
            echo "Branch ${BRANCH} already exists on remote — skipping bump (burst-collapse)."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      # Update the version field in Chart.yaml using python3 (available on all
      # GitHub-hosted runners). Regex substitution on the 'version:' line only
      # avoids inadvertently touching appVersion or dependency versions.
      - name: Update Chart.yaml version
        if: steps.idempotency.outputs.skip != 'true'
        run: |
          NEW_VERSION="${{ steps.new.outputs.version }}"
          python3 - charts/shipwright/Chart.yaml "$NEW_VERSION" <<'PYEOF'
          import sys, re
          path, new_ver = sys.argv[1], sys.argv[2]
          with open(path, 'r') as f:
              content = f.read()
          content = re.sub(r'^version:.*$', f'version: {new_ver}', content, flags=re.MULTILINE)
          with open(path, 'w') as f:
              f.write(content)
          PYEOF

      # Record every batched release tag in the Artifact Hub change log
      # annotation — one "changed" entry per tag, so a burst-collapsed bump
      # still surfaces exactly which releases it contains.
      - name: Update artifacthub.io/changes annotation
        if: steps.idempotency.outputs.skip != 'true'
        run: |
          TAGS_CSV="${{ steps.batch.outputs.tags }}"
          NEW_VERSION="${{ steps.new.outputs.version }}"
          python3 - charts/shipwright/Chart.yaml "$TAGS_CSV" "$NEW_VERSION" <<'PYEOF'
          import sys, re
          path, tags_csv, ver = sys.argv[1], sys.argv[2], sys.argv[3]
          tags = [t for t in tags_csv.split(',') if t]
          with open(path, 'r') as f:
              content = f.read()
          lines = ["  artifacthub.io/changes: |"]
          for tag in tags:
              lines.append("    - kind: changed")
              lines.append(f'      description: "auto-bump to chart v{ver} triggered by release tag {tag}"')
          new_block = "\n".join(lines)
          content = re.sub(
              r'  artifacthub\.io/changes:.*?(?=\n\S|\Z)',
              new_block,
              content,
              flags=re.DOTALL,
          )
          with open(path, 'w') as f:
              f.write(content)
          PYEOF

      # Prepend a new entry to CHANGELOG.md so it stays in sync with Chart.yaml.
      # Chart.yaml line 28-29 requires the two to mirror each other on every bump.
      - name: Update CHANGELOG.md
        if: steps.idempotency.outputs.skip != 'true'
        run: |
          NEW_VERSION="${{ steps.new.outputs.version }}"
          TAGS_CSV="${{ steps.batch.outputs.tags }}"
          TAGS_LIST=$(echo "$TAGS_CSV" | tr ',' '\n' | sed 's/^/`/; s/$/`/' | paste -sd, - | sed 's/,/, /g')
          DATE=$(date -u +%Y-%m-%d)
          ENTRY="## [${NEW_VERSION}] - ${DATE}\n\n### Changed\n\n- auto-bump to chart v${NEW_VERSION} triggered by release tag(s): ${TAGS_LIST}\n"
          # Prepend the new entry after the header block (after the last line starting with '#' in the preamble)
          python3 - charts/shipwright/CHANGELOG.md "$ENTRY" <<'PYEOF'
          import sys
          path = sys.argv[1]
          entry = sys.argv[2].replace('\\n', '\n')
          with open(path, 'r') as f:
              content = f.read()
          # Insert after the first H2 heading boundary — find the first '## [' and insert before it
          idx = content.find('\n## [')
          if idx == -1:
              content = content + '\n' + entry
          else:
              content = content[:idx + 1] + entry + '\n' + content[idx + 1:]
          with open(path, 'w') as f:
              f.write(content)
          PYEOF

      # Pin every batched release tag into its values.yaml default(s) — the
      # chart's GHCR image defaults (values.yaml's admin/metrics/agent/
      # taskStore/chat blocks, added by DCC-2.1) must track the same releases
      # this bump is crediting, not silently lag behind Chart.yaml/CHANGELOG.
      # Same logic as .github/workflows/test-auto-bump-chart.sh's
      # service_for_tag / values_paths_for_service / highest_semver_tag /
      # select_pinned_tags / update_values_tag — keep both copies in sync.
      - name: Pin released tags into values.yaml
        id: pin
        if: steps.idempotency.outputs.skip != 'true'
        run: |
          # Maps a release tag prefix to its service key.
          service_for_tag() {
            local tag="$1"
            case "$tag" in
              admin-v*) echo "admin" ;;
              metrics-v*) echo "metrics" ;;
              agent-v*) echo "agent" ;;
              task-store-v*) echo "task-store" ;;
              chat-v*) echo "chat" ;;
              *) echo "" ;;
            esac
          }

          # Maps a service key to the values.yaml dot-paths that must be
          # pinned to its released tag. agent pins two paths from the same
          # tag: the top-level agent image and the admin-provisioned agent
          # image nested under agent.provisioning.
          values_paths_for_service() {
            local service="$1"
            case "$service" in
              admin) printf '%s\n' "admin.image.tag" ;;
              metrics) printf '%s\n' "metrics.image.tag" ;;
              agent) printf '%s\n' "agent.image.tag" "agent.provisioning.image.tag" ;;
              task-store) printf '%s\n' "taskStore.image.tag" ;;
              chat) printf '%s\n' "chat.image.tag" ;;
              *) return 1 ;;
            esac
          }

          # Highest-semver tag among the given tags (space-separated, same
          # prefix). Strips the non-numeric prefix so `sort -V` compares the
          # bare X.Y.Z portion, then re-attaches the winning original tag.
          highest_semver_tag() {
            local tag
            for tag in "$@"; do
              printf '%s %s\n' "${tag##*-v}" "$tag"
            done | sort -V | tail -n1 | cut -d' ' -f2-
          }

          # Groups a comma-separated tag batch by service and picks the
          # highest-semver tag per service. Emits "service=tag" pairs, one
          # per line, sorted by service name for deterministic output.
          select_pinned_tags() {
            local tags_csv="$1"
            local tag service
            declare -A best

            IFS=',' read -ra all_tags <<< "$tags_csv"
            for tag in "${all_tags[@]}"; do
              [ -z "$tag" ] && continue
              service=$(service_for_tag "$tag")
              [ -z "$service" ] && continue
              if [ -z "${best[$service]:-}" ]; then
                best[$service]="$tag"
              else
                best[$service]=$(highest_semver_tag "${best[$service]}" "$tag")
              fi
            done

            for service in "${!best[@]}"; do
              printf '%s=%s\n' "$service" "${best[$service]}"
            done | sort
          }

          # Writes `tag` into the value at `dot_path` (e.g.
          # "agent.provisioning.image.tag") inside values.yaml, matching only
          # the `tag:` line nested under the exact chain of parent keys
          # (indentation-scoped) — never a blind global regex, so
          # agent.image.tag and agent.provisioning.image.tag can be updated
          # independently even though both lines read "tag: agent-v...".
          update_values_tag() {
            local values_yaml="$1"
            local dot_path="$2"
            local new_tag="$3"
            python3 - "$values_yaml" "$dot_path" "$new_tag" <<'PYEOF'
          import sys

          path, dot_path, new_tag = sys.argv[1], sys.argv[2], sys.argv[3]
          keys = dot_path.split('.')

          with open(path, 'r') as f:
              lines = f.readlines()

          # Walk the key chain top-down. Each key must be found at exactly
          # one indentation level deeper than the previous key, searching
          # only within the span of lines belonging to the previous key's
          # block (up to the next line at the same-or-shallower indentation).
          search_start, search_end = 0, len(lines)
          indent = -1
          for depth, key in enumerate(keys):
              is_last = depth == len(keys) - 1
              target_indent = indent + 2 if indent >= 0 else 0
              found_at = None
              for i in range(search_start, search_end):
                  line = lines[i]
                  stripped = line.lstrip(' ')
                  this_indent = len(line) - len(stripped)
                  if this_indent < target_indent:
                      break
                  if this_indent != target_indent:
                      continue
                  key_match = stripped.rstrip('\n') == f'{key}:' or stripped.startswith(f'{key}:')
                  if key_match:
                      found_at = i
                      break
              if found_at is None:
                  raise SystemExit(f'path segment {key!r} not found for dot_path {dot_path!r}')
              if is_last:
                  lines[found_at] = f'{" " * target_indent}{key}: {new_tag}\n'
              else:
                  block_start = found_at + 1
                  block_end = search_end
                  for j in range(block_start, search_end):
                      j_stripped = lines[j].lstrip(' ')
                      if j_stripped.strip() == '':
                          continue
                      j_indent = len(lines[j]) - len(j_stripped)
                      if j_indent <= target_indent:
                          block_end = j
                          break
                  search_start, search_end = block_start, block_end
                  indent = target_indent

          with open(path, 'w') as f:
              f.writelines(lines)
          PYEOF
          }

          TAGS_CSV="${{ steps.batch.outputs.tags }}"
          PINNED=$(select_pinned_tags "$TAGS_CSV")

          # Rendered alongside the values.yaml writes below (same
          # service/path loop) as "- `admin.image.tag`: `admin-v0.156.2`"
          # markdown lines, so the "Open bump PR" step can drop them
          # straight into the PR body without re-deriving the
          # service→path mapping itself.
          PINNED_LINES=""
          while IFS='=' read -r service tag; do
            [ -z "$service" ] && continue
            while IFS= read -r path; do
              update_values_tag charts/shipwright/values.yaml "$path" "$tag"
              echo "Pinned ${path} = ${tag}"
              PINNED_LINES="${PINNED_LINES}- \`${path}\`: \`${tag}\`
          "
            done < <(values_paths_for_service "$service")
          done <<< "$PINNED"

          # Thread the pinned tags into later steps via multi-line
          # GITHUB_OUTPUT (heredoc form, EOF delimiter is safe — tag values
          # never contain newlines).
          {
            echo "pinned<<PINEOF"
            echo "$PINNED"
            echo "PINEOF"
            echo "pinned_lines<<PINLINESEOF"
            echo "$PINNED_LINES"
            echo "PINLINESEOF"
          } >> "$GITHUB_OUTPUT"
          echo "Pinned tags for this bump:"
          echo "$PINNED"

      # Create a dedicated branch, commit the Chart.yaml + CHANGELOG.md +
      # values.yaml changes, and push.
      - name: Commit and push bump branch
        id: commit-push
        if: steps.idempotency.outputs.skip != 'true'
        run: |
          BRANCH="${{ steps.new.outputs.branch }}"
          NEW_VERSION="${{ steps.new.outputs.version }}"
          TAGS_CSV="${{ steps.batch.outputs.tags }}"
          TAGS_LINES=$(echo "$TAGS_CSV" | tr ',' '\n' | sed 's/^/  - /')

          git checkout -b "$BRANCH"
          git add charts/shipwright/Chart.yaml charts/shipwright/CHANGELOG.md charts/shipwright/values.yaml
          git commit -m "chore(chart): bump chart version to ${NEW_VERSION}

          Auto-bump triggered by release tag(s):
          ${TAGS_LINES}

          After merge, chart-release.yml will publish chart v${NEW_VERSION}."

          # Fault-tolerant push: if a concurrent run slips through the
          # idempotency check (ls-remote and push are non-atomic), the second
          # push will fail because the branch already exists. Treat that as a
          # clean skip rather than a noisy workflow failure.
          git push -u origin "$BRANCH" || {
            echo "Branch ${BRANCH} already pushed by a concurrent run — skipping."
            echo "push_skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          }

      # Open the PR targeting main. The title triggers chart-testing CI (helm.yml)
      # and the merge will trigger chart-release.yml (which watches charts/**).
      - name: Open bump PR
        if: steps.idempotency.outputs.skip != 'true' && steps.commit-push.outputs.push_skipped != 'true'
        id: pr
        env:
          GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
          # Pre-rendered "- `admin.image.tag`: `admin-v0.156.2`" lines from
          # the "Pin released tags into values.yaml" step, so the PR body
          # lists exactly which tag(s) were pinned and where. Passed via env
          # (not spliced into the script body as a GHA expression) because
          # this content contains backticks — interpolating it directly into
          # a double-quoted bash string below would splice raw backticks into
          # the script source itself, which bash then parses as command
          # substitution (crashing with "command not found" before `gh pr
          # create` ever runs). Routing it through env keeps the backticks
          # inside a runtime variable's value, where `${PINNED_LINES}` below
          # is a single parameter expansion — bash does not re-scan an
          # expanded value for further substitution.
          PINNED_LINES: ${{ steps.pin.outputs.pinned_lines }}
        run: |
          NEW_VERSION="${{ steps.new.outputs.version }}"
          CURRENT_VERSION="${{ steps.current.outputs.version }}"
          TAGS_CSV="${{ steps.batch.outputs.tags }}"
          TAGS_LINES=$(echo "$TAGS_CSV" | tr ',' '\n' | sed 's/^/- `/; s/$/`/')
          BRANCH="${{ steps.new.outputs.branch }}"

          PR_URL=$(gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore(chart): bump chart version to ${NEW_VERSION}" \
            --label automated \
            --body "$(cat <<EOF
          ## Chart version bump: ${CURRENT_VERSION} → ${NEW_VERSION}

          **Triggering tags:**
          ${TAGS_LINES}

          **New chart version:** \`${NEW_VERSION}\`

          **Pinned in values.yaml:**
          ${PINNED_LINES}

          ### What happens next

          1. This PR is auto-merged (squash) once CI passes.
          2. The merge triggers \`chart-release.yml\`, which packages and publishes
             chart v${NEW_VERSION} to the Helm repository.

          ---
          _Auto-generated by \`.github/workflows/auto-bump-chart.yml\`._
          EOF
          )")

          echo "pr_url=${PR_URL}" >> "$GITHUB_OUTPUT"
          echo "Opened PR: ${PR_URL}"

      # Merge directly once required checks pass, rather than GitHub's native
      # queued auto-merge (`gh pr merge --auto`). Native auto-merge only
      # re-evaluates mergeability on its own schedule, which can lag well past
      # this workflow's 10-minute wait. `--admin` is required because this PR
      # is self-authored (no external reviewer can approve it) and branch
      # protection otherwise rejects the merge outright — confirmed via
      # PR #1084, where `gh pr merge --squash` (no `--admin`) failed with
      # "the base branch policy prohibits the merge" even after checks passed.
      #
      # Retry on stale-base races: this workflow and sync-plugin-version.yml
      # both trigger off the same tag pushes and race to merge onto main.
      # When the other workflow's PR lands first, main moves out from under
      # this PR (no textual conflict — just a stale base ref) and
      # `gh pr merge` fails with a transient GraphQL error: "Base branch was
      # modified. Review and try the merge again." Confirmed via run
      # 28703925995 (agent-v0.129.0, 2026-07-04 10:54). Retry a few times
      # with a short sleep to absorb that window. Detection matches on "Base
      # branch was modified" alone — that phrase is unambiguous and always
      # present in the real error, so it's sufficient without also matching
      # the more generic "try the merge again" (which could otherwise match
      # unrelated errors and retry something that isn't a stale-base race).
      # Any other failure (real conflict, auth error, branch protection
      # rejection, etc.) is NOT retried — fail immediately so a human is
      # alerted, same as before this change. If the stale-base error persists
      # past all retries, the step still ultimately fails for the same
      # reason.
      - name: Wait for checks and merge
        if: steps.idempotency.outputs.skip != 'true' && steps.commit-push.outputs.push_skipped != 'true'
        timeout-minutes: 10
        env:
          GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
        run: |
          PR_URL="${{ steps.pr.outputs.pr_url }}"

          # `gh pr checks --watch` fails fast with "no checks reported" if it
          # runs before GitHub has registered any check runs on the new
          # commit — the check-triggering workflows haven't started yet
          # immediately after `gh pr create`. Poll until at least one check
          # appears before handing off to --watch.
          echo "Waiting for checks to register on ${PR_URL}..."
          for _ in $(seq 1 30); do
            CHECK_COUNT=$(gh pr checks "$PR_URL" --json name -q 'length' 2>/dev/null || echo 0)
            [ "$CHECK_COUNT" -gt 0 ] && break
            sleep 2
          done

          echo "Waiting for required checks on ${PR_URL}..."
          gh pr checks "$PR_URL" --watch --interval 15 --required
          echo "Checks passed — merging ${PR_URL}."

          # Detects the transient stale-base GraphQL error (see comment
          # above). Mirrors .github/workflows/test-auto-bump-chart.sh — keep
          # both copies in sync.
          is_stale_base_error() {
            local output="$1"
            if echo "$output" | grep -qi "Base branch was modified"; then
              return 0
            fi
            return 1
          }

          MAX_ATTEMPTS=3
          for attempt in $(seq 1 "$MAX_ATTEMPTS"); do
            MERGE_OUTPUT=$(gh pr merge "$PR_URL" --squash --admin 2>&1) && {
              echo "$MERGE_OUTPUT"
              echo "Merged ${PR_URL}."
              exit 0
            }

            echo "$MERGE_OUTPUT" >&2

            if is_stale_base_error "$MERGE_OUTPUT" && [ "$attempt" -lt "$MAX_ATTEMPTS" ]; then
              echo "Stale-base race detected (attempt ${attempt}/${MAX_ATTEMPTS}) — retrying in 5s..."
              sleep 5
              continue
            fi

            echo "Merge failed on attempt ${attempt}/${MAX_ATTEMPTS} — not retrying (either not a stale-base error, or retries exhausted)."
            exit 1
          done
