name: Chart Release

# Publishes the Helm chart at charts/shipwright to a GitHub Pages Helm repository
# (the `gh-pages` branch) so it is consumable via `helm repo add`.
#
# Kept SEPARATE from release.yml (the app's semantic-release): this workflow only
# concerns the Helm chart artifact. Two concerns:
#
#   publish (push to main) — packages charts/shipwright into a `.tgz`, merges it
#     into the existing gh-pages `index.yaml` (with the public Pages `--url`), and
#     commits BOTH the `.tgz` and the regenerated `index.yaml` directly to the
#     `gh-pages` branch root. It creates NO GitHub Releases. The publish is keyed
#     off `Chart.yaml`'s `version`: a re-run with an unchanged version repackages
#     an identical `.tgz` (same digest) and produces no committable diff, so the
#     effective trigger is "a chart version bump landed on main". Consumption is
#     PULL-based: downstream consumers (e.g. Renovate) detect the new version on
#     gh-pages on their own schedule — this workflow sends no push notification.
#
#   dry-run (pull_request) — validates that the chart packages and the index
#     merges, WITHOUT publishing anything. This is the PR-time test for the
#     publish path (see also .github/workflows/helm.yml for lint/install gates).
on:
  push:
    branches: [main]
    paths:
      - "charts/shipwright/**"
      - ".github/workflows/chart-release.yml"
  pull_request:
    paths:
      - "charts/shipwright/**"
      - ".github/workflows/chart-release.yml"

# Least privilege at the workflow level; the publish job widens to contents:write.
permissions:
  contents: read

env:
  # Public GitHub Pages URL the gh-pages branch is served from. Every newly
  # packaged chart's index entry resolves to <PAGES_URL>/<name>-<version>.tgz.
  PAGES_URL: https://app-vitals.github.io/shipwright

jobs:
  # Publish job — runs ONLY on push to main, never on pull_request.
  #
  # Serialized by a concurrency group: two chart releases can never run at once,
  # which closes the index-corruption race (concurrent `--merge` + push to the
  # same gh-pages index.yaml). cancel-in-progress is FALSE so an in-flight
  # release that has already packaged a `.tgz` is allowed to finish and push
  # rather than being aborted mid-publish.
  publish:
    name: package + publish (gh-pages)
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    concurrency:
      group: chart-release
      cancel-in-progress: false
    permissions:
      contents: write # push the .tgz + index.yaml to gh-pages
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Configure Git identity
        run: |
          git config --global user.name "$GITHUB_ACTOR"
          git config --global user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.18.6

      - name: Build chart dependencies
        run: helm dependency build charts/shipwright

      - name: Package chart into gh-pages
        run: helm package charts/shipwright -d gh-pages/

      - name: Merge repo index
        # --merge preserves every existing entry (including legacy entries whose
        # urls still point at old GitHub Release assets); only newly packaged
        # versions gain a <PAGES_URL>/<name>-<version>.tgz url.
        # Guard: --merge fails if index.yaml doesn't exist yet (first-time publish
        # on a gh-pages branch initialized with an empty orphan commit). The flag
        # is only passed when the file is already present.
        run: |
          MERGE_FLAG=""
          [ -f gh-pages/index.yaml ] && MERGE_FLAG="--merge gh-pages/index.yaml"
          helm repo index gh-pages/ $MERGE_FLAG --url "$PAGES_URL"

      - name: Parse chart version
        id: chart-version
        run: |
          CHART_VERSION=$(grep '^version:' charts/shipwright/Chart.yaml | sed 's/^version: //')
          [ -z "$CHART_VERSION" ] && echo "Error: could not parse chart version from Chart.yaml" && exit 1
          echo "version=${CHART_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Chart version: ${CHART_VERSION}"

      - name: Commit and push to gh-pages
        working-directory: gh-pages
        run: |
          git add -- '*.tgz' index.yaml
          if git diff --cached --quiet; then
            echo "No chart changes to publish (version ${{ steps.chart-version.outputs.version }} already on gh-pages)."
            exit 0
          fi
          git commit -m "chart: publish shipwright ${{ steps.chart-version.outputs.version }}"
          git push origin gh-pages

  # Dry-run validation — runs ONLY on pull_request. Proves the chart packages and
  # the index merges with the production --url; publishes nothing (no gh-pages
  # push, no GitHub Release). No concurrency guard: dry runs touch no shared state.
  dry-run:
    name: package + index (dry run)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.18.6

      - name: Build chart dependencies
        run: helm dependency build charts/shipwright

      - name: Package chart (no publish)
        run: helm package charts/shipwright -d .cr-release-packages

      - name: Generate repo index (no publish)
        # Mirrors the publish job's --url so the dry run exercises the exact index
        # entries production will write.
        run: helm repo index .cr-release-packages --url "$PAGES_URL"

      - name: Show packaged artifacts
        run: ls -la .cr-release-packages
