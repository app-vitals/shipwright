name: Build and Push Chat Image

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write
  id-token: write

jobs:
  filter:
    name: filter changed paths
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.filter.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          base: ${{ github.event.workflow_run.head_sha }}~1
          ref: ${{ github.event.workflow_run.head_sha }}
          filters: |
            changed:
              - "chat/**"
              - "lib/**"
              - "package.json"
              - "bun.lock"
              - ".github/workflows/build-chat.yml"

  build-and-push:
    name: build / tag / push
    needs: filter
    if: needs.filter.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Bump version and push tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.DISPATCH_TOKEN }}
          tag_prefix: "chat-v"
          default_bump: patch
          fetch_all_tags: true

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ secrets.ARTIFACT_REGISTRY_HOST }} --quiet

      - name: Build Docker image
        run: |
          docker build \
            -f chat/Dockerfile \
            -t ${{ secrets.ARTIFACT_REGISTRY_REPO }}/shipwright-chat:${{ steps.tag.outputs.new_tag }} \
            .

      - name: Push Docker image
        run: |
          docker push ${{ secrets.ARTIFACT_REGISTRY_REPO }}/shipwright-chat:${{ steps.tag.outputs.new_tag }}
