# Default values for the shipwright chart.
# This is a YAML-formatted file. Minikube-friendly defaults throughout.
#
# NOTE: The shipwright workload templates (Deployments/Services for admin, metrics,
# and agent) land in a later task (HD-3.x). This release is the chart skeleton:
# the values surface, helpers, NOTES, and the PostgreSQL dependency. With defaults,
# `helm template` renders the PostgreSQL subchart + NOTES only.

# -- Global values shared with subcharts (including Bitnami PostgreSQL).
global:
  # -- Override the registry for ALL images (chart + subcharts) in one place.
  # Set this to a mirror (e.g. your registry, or a `bitnamilegacy` mirror) if the
  # default Bitnami registry tags become unavailable. See README "Bitnami registry risk".
  imageRegistry: ""
  # -- Global image pull secrets (list of secret names) applied to all pods.
  imagePullSecrets: []
  # -- Global storage class for PersistentVolumeClaims (chart + subcharts).
  storageClass: ""

# -- Default image pull policy for shipwright service images.
imagePullPolicy: IfNotPresent

# -- Naming overrides.
nameOverride: ""
fullnameOverride: ""

# -- Networking exposure strategy for shipwright services.
networking:
  # -- How services are exposed:
  #    "ClusterIP" | "NodePort" | "LoadBalancer" | "ingress" | "gateway".
  # Minikube-friendly default is ClusterIP (reach via `minikube service` / port-forward).
  # Set to "ingress" to render an Ingress (templates/ingress.yaml) routing the admin
  # UI/API at "/" and the metrics dashboard at "/dashboard"; the Services keep their
  # own ClusterIP type (admin.service.type / metrics.service.type).
  # Set to "gateway" to render a Gateway API Gateway + HTTPRoute(s)
  # (templates/gateway.yaml, templates/httproute.yaml) instead — mutually exclusive
  # with "ingress" (only one of Ingress / Gateway is ever rendered).
  type: ClusterIP
  # -- Ingress settings (used ONLY when networking.type=ingress).
  ingress:
    # -- IngressClass to use: "nginx" for the Minikube/NGINX ingress addon,
    # "alb" for the AWS Load Balancer Controller on EKS, etc.
    className: nginx
    # -- Host the Ingress answers for. Minikube-friendly default; for the NGINX
    # addon add it to /etc/hosts pointing at `minikube ip`.
    host: shipwright.local
    # -- Extra annotations for the Ingress (controller-specific). For ALB, e.g.
    # alb.ingress.kubernetes.io/scheme, /target-type; for NGINX, rewrite/ssl rules.
    annotations: {}
  # -- Gateway API settings (used ONLY when networking.type=gateway). Renders a
  # gateway.networking.k8s.io/v1 Gateway plus HTTPRoute(s) routing the admin UI/API
  # at "/" and the metrics dashboard at "/dashboard". Requires the Gateway API CRDs
  # (and a controller for the chosen gatewayClassName) installed in the cluster.
  gateway:
    # -- GatewayClass to bind to. Default targets GKE's managed external L7 LB
    # (gke-l7-global-external-managed). On other platforms set the class your
    # Gateway controller provides (e.g. "istio", "nginx", "cilium").
    gatewayClassName: gke-l7-global-external-managed
    # -- Host the Gateway listener + HTTPRoutes answer for.
    host: shipwright.local
    # -- Extra annotations for the Gateway (controller-specific).
    annotations: {}
    # -- GKE HealthCheckPolicy. When enabled, renders a networking.gke.io/v1
    # HealthCheckPolicy for the admin and metrics Services so the GKE load
    # balancer probes /health instead of the default "/". Without this, both
    # services answer "/" with 404 and the backend is marked UNHEALTHY (external
    # 503). Only applies when networking.type=gateway.
    healthCheckPolicy:
      enabled: false

# -- TLS / certificate management for the gateway/ingress host.
tls:
  # -- cert-manager integration. When enabled AND networking.type=gateway, renders
  # a cert-manager.io/v1 Certificate (templates/certificate.yaml) for
  # networking.gateway.host and the Gateway adds an HTTPS (:443) listener
  # referencing the issued Secret. An HTTP→HTTPS redirect HTTPRoute is also
  # rendered on the Gateway's "http" listener so that plaintext traffic is
  # redirected (301) to HTTPS — the standard expectation for GKE
  # gke-l7-global-external-managed and any TLS-enabled Gateway deployment.
  # Has no effect when networking.type is not "gateway". Disabled by default
  # (Minikube = plain HTTP, no cert-manager installed).
  certManager:
    enabled: false
    # -- Reference to the cert-manager Issuer/ClusterIssuer that signs the cert.
    issuerRef:
      # -- Name of the (Cluster)Issuer (e.g. "letsencrypt-prod").
      name: ""
      # -- Issuer kind: "ClusterIssuer" (cluster-scoped) or "Issuer" (namespaced).
      kind: ClusterIssuer

# -- ServiceAccount for shipwright workloads.
serviceAccount:
  # -- Whether a ServiceAccount is created.
  create: true
  # -- Annotations to add to the ServiceAccount.
  annotations: {}
  # -- Name of the ServiceAccount. If empty and create=true, a name is generated.
  name: ""

# -- Admin service (@shipwright/admin) — CRUD API + UI. Port 3001.
admin:
  enabled: true
  image:
    repository: shipwright-admin
    tag: ""           # defaults to .Chart.AppVersion when empty
    pullPolicy: ""    # defaults to top-level imagePullPolicy when empty
  service:
    # -- Service type for the admin service. ClusterIP is Minikube-friendly.
    type: ClusterIP
    port: 3001
  replicas: 1
  # -- Compute resources for the admin container. Minikube-friendly defaults.
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi
  # -- ServiceAccount for the admin workload.
  serviceAccount:
    # -- Whether a ServiceAccount is created for the admin workload.
    create: true
    # -- Annotations to add to the admin ServiceAccount.
    annotations: {}
    # -- Name of the admin ServiceAccount. Generated if empty and create=true.
    name: ""
  # -- Stable encryption and session keys via an existing Secret.
  # When existingSecret is non-empty, SHIPWRIGHT_ENCRYPTION_KEY and
  # SHIPWRIGHT_SESSION_SECRET are sourced from that pre-existing Secret instead
  # of being generated/reused by the chart. Set this on fresh namespace installs
  # where those keys must match previously-encrypted data — a fresh install
  # without this generates random keys that cannot decrypt existing agent env
  # (caused the 2026-06-16 prod outage). Leave empty to use the chart-managed
  # Secret (generate on first install, reuse on upgrade via lookup).
  encryptionKeys:
    existingSecret: ""
    # -- Key in existingSecret that holds SHIPWRIGHT_ENCRYPTION_KEY.
    encryptionKeyRef: SHIPWRIGHT_ENCRYPTION_KEY
    # -- Key in existingSecret that holds SHIPWRIGHT_SESSION_SECRET.
    sessionSecretRef: SHIPWRIGHT_SESSION_SECRET
  # -- Public base URL for the admin service (sets SHIPWRIGHT_ADMIN_APP_BASE_URL).
  # Required when the admin service is behind a Gateway or Ingress so that OAuth
  # redirect URIs use the public host instead of localhost:3001. Leave empty to
  # omit the env var.
  appBaseUrl: ""
  # -- Extra environment variables injected into the admin container.
  # List of Kubernetes envVar objects (name/value or name/valueFrom). Use for
  # env vars not otherwise covered by chart values.
  extraEnv: []

# -- Metrics dashboard (@shipwright/metrics) — event-store-backed service. Port 3460.
# In postgres mode it reads/writes an `events` table in the bundled PostgreSQL and
# serves the dashboard at /dashboard; the DB-independent /health drives readiness.
metrics:
  enabled: true
  image:
    repository: shipwright-metrics
    tag: ""           # defaults to .Chart.AppVersion when empty
    pullPolicy: ""    # defaults to top-level imagePullPolicy when empty
  service:
    # -- Service type for the metrics service. ClusterIP is Minikube-friendly.
    type: ClusterIP
    port: 3460
  replicas: 1
  # -- Compute resources for the metrics container. Minikube-friendly defaults.
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi
  # -- ServiceAccount for the metrics workload.
  serviceAccount:
    # -- Whether a ServiceAccount is created for the metrics workload.
    create: true
    # -- Annotations to add to the metrics ServiceAccount.
    annotations: {}
    # -- Name of the metrics ServiceAccount. Generated if empty and create=true.
    name: ""
  # -- PostgreSQL event-store database for the metrics service (postgres mode).
  database:
    # -- Database name for the metrics event store. Defaults to a SEPARATE
    # database ("shipwright_metrics") from the admin service. This isolation is
    # REQUIRED: the metrics provider creates its own `events` table on boot, and
    # sharing the admin database would make the admin schema non-empty and break
    # the admin service's `prisma migrate deploy` baseline (Prisma error P3005).
    # When the bundled PostgreSQL subchart is enabled, this database is created
    # automatically by a parent-chart init ConfigMap wired via
    # postgresql.primary.initdb.scriptsConfigMap (see below); the created name
    # tracks this value, so an override here stays in sync everywhere. If you
    # bring your own Postgres (postgresql.enabled=false), pre-create this database
    # or point METRICS_DATABASE_URL at it yourself.
    name: shipwright_metrics
  # -- Stable session secret via an existing Secret. When existingSecret is
  # non-empty, SHIPWRIGHT_SESSION_SECRET (signs/validates the dashboard session
  # JWT) is sourced from that pre-existing Secret instead of the chart-generated
  # random. Point this at the SAME Secret the admin uses (admin.encryptionKeys.
  # existingSecret) so admin-minted sessions validate at the metrics service when
  # both sit behind a shared Gateway — a mismatch 401s the dashboard's metrics
  # view. Leave empty to use the chart-managed Secret (generate on first install,
  # reuse on upgrade via lookup).
  sessionSecret:
    existingSecret: ""
    # -- Key in existingSecret that holds SHIPWRIGHT_SESSION_SECRET.
    sessionSecretRef: SHIPWRIGHT_SESSION_SECRET
  # -- Provider and environment surface for the metrics dashboard.
  # All fields are optional and additive — defaults preserve the existing
  # SQLite / bundled-PostgreSQL fallback behavior unchanged.
  provider:
    # -- PostHog analytics provider (optional). When configured, the metrics
    # dashboard sends events to PostHog instead of the bundled store.
    # Leave existingSecret empty (the default) to disable PostHog injection.
    posthog:
      # -- Name of an existing Secret holding PostHog API credentials.
      # Leave empty to disable PostHog env injection.
      existingSecret: ""
      # -- Key in the secret for POSTHOG_PERSONAL_API_KEY.
      personalApiKeyRef: POSTHOG_PERSONAL_API_KEY
      # -- Key in the secret for POSTHOG_PROJECT_ID.
      projectIdRef: POSTHOG_PROJECT_ID
    # -- URL of the admin service as seen by the metrics dashboard.
    # Required when not using the bundled admin service (e.g., external admin).
    # Leave empty to omit the METRICS_ADMIN_URL env var.
    adminUrl: ""
    # -- Base path for the metrics dashboard (e.g., /dashboard). Leave empty
    # to omit the METRICS_BASE_PATH env var (defaults to root inside the app).
    basePath: ""
    # -- When true, require OWNER role for dashboard access.
    # Injects METRICS_REQUIRE_OWNER_ROLE=true when enabled.
    requireOwnerRole: false
    # -- Internal API key shared between metrics and admin services.
    # Set existingSecret to inject METRICS_INTERNAL_API_KEY via secretKeyRef.
    internalKey:
      # -- Name of an existing Secret holding the internal API key.
      # Leave empty to omit the METRICS_INTERNAL_API_KEY env var.
      existingSecret: ""
      # -- Key in the secret for METRICS_INTERNAL_API_KEY.
      key: METRICS_INTERNAL_API_KEY

# -- Agent service (@shipwright/agent) — autonomous runner + admin CRUD. Port 3000.
agent:
  enabled: true
  image:
    repository: shipwright-agent
    tag: ""
    pullPolicy: ""
  service:
    port: 3000
  replicas: 1
  # -- Provisioning controls for the agent's persistent home / workspace.
  provisioning:
    # -- Whether the admin service provisions agent workloads at runtime. OFF by
    # default: the chart renders NO provisioning RBAC/ServiceAccount and injects
    # NO provisioning env, so admin stays in Noop mode (no cluster access). Set
    # true to render the Role/ClusterRole + RoleBinding/ClusterRoleBinding + agent SA
    # and inject the provisioner env contract (matching admin/src/main.ts buildProvisioner)
    # into the admin Deployment. RBAC scope depends on provisioning.namespace: empty =
    # namespace-scoped Role; non-empty = cluster-scoped ClusterRole.
    enabled: false
    # -- Override namespace for provisioned agent resources. Empty (default) uses
    # the pod's own release namespace (injected via the downward API). Set to
    # provision agents into a different namespace — uses ClusterRole RBAC when set,
    # Role when empty.
    namespace: ""
    # -- Image the admin provisioner stamps onto agent Deployments.
    image:
      repository: shipwright-agent
      tag: ""           # defaults to .Chart.AppVersion when empty
    # -- Replica count for provisioned agent Deployments.
    replicas: 1
    # -- ServiceAccount provisioned agent pods run as (SEPARATE from the admin SA).
    serviceAccount:
      # -- Whether to create the agent ServiceAccount (only when provisioning.enabled).
      create: true
      # -- Annotations to add to the agent ServiceAccount.
      annotations: {}
      # -- Name of the agent ServiceAccount. Generated if empty and create=true.
      name: ""
    # -- In-cluster admin/gateway URL handed to provisioned agents. Empty → built
    # from the admin Service DNS name + port. Set to point agents at an external
    # gateway.
    apiUrl: ""
    # -- PVC name template for provisioned agents. When non-empty, the provisioner
    # substitutes `{name}` with the agent's human-readable name (slug) to derive the
    # PVC name. Use this when migrating from static agents whose PVCs were created
    # with a specific naming convention (e.g. "my-org-agent-{name}-home").
    # When empty (the default), PVCs are named `{sanitizedAgentId}-home`.
    pvcNameTemplate: ""
    # -- Provisioned workspace PVCs: created per-agent when the provisioner spins
    # up a new agent pod. These settings are surfaced for the agent manifest
    # builder's future use. NOTE: buildProvisioner does not read these as env
    # today, so they are NOT injected into the admin Deployment.
    pvc:
      size: 2Gi
      # -- StorageClass for provisioned agent PVCs. Empty uses the cluster default.
      storageClass: ""
    # -- Agent container's own home directory PVC (AGENT_HOME): persists the
    # agent's own data across pod restarts. This is NOT related to
    # provisioned-agent workspaces — see pvc above for those.
    persistence:
      enabled: true
      size: 2Gi
      # -- StorageClass for the agent PVC. Empty uses the cluster default (or global.storageClass).
      storageClass: ""
      accessModes:
        - ReadWriteOnce
    # -- Mount path inside the agent container for persistent storage.
    homePath: /data/agent-home
  # -- Agent voice (speech-to-text / text-to-speech) — a DEPLOY-TIME option.
  # OFF by default: no Whisper pod/Service, no voice Secret, and NO voice env is
  # injected into the admin (so provisioned agent pods keep just the 3 base vars).
  # When enabled, the admin's buildProvisioner (admin/src/main.ts) reads the voice
  # env injected below and flows it into every provisioned agent pod:
  #   - provider=whisper → WHISPER_SERVICE_URL (the in-cluster Whisper Service) +
  #     ELEVENLABS_API_KEY (TTS); a Whisper Deployment+Service is rendered.
  #   - provider=groq    → GROQ_API_KEY (STT) + ELEVENLABS_API_KEY (TTS); no pod.
  voice:
    # -- Master switch. Default false → nothing voice-related renders.
    enabled: false
    # -- STT provider: "whisper" (self-hosted pod) or "groq" (Groq cloud STT).
    # TTS is always ElevenLabs (with an in-agent edge-tts fallback when no key).
    provider: whisper
    # -- Self-hosted Whisper ASR pod (used ONLY when provider=whisper). Renders a
    # Deployment + Service running onerahmet/openai-whisper-asr-webservice, whose
    # POST /asr endpoint the agent's whisper-svc client targets.
    whisper:
      # -- Whisper ASR image. The onerahmet image exposes POST /asr (multipart
      # `audio_file`, query task=transcribe&output=txt). Pinned to v1.3.0 (tested
      # version) — do not float to :latest; the plain-text /asr contract is tightly
      # coupled to this tag and a silent image update on helm upgrade can break it.
      image: onerahmet/openai-whisper-asr-webservice:v1.3.0
      # -- Service exposing the Whisper pod in-cluster. The container listens on
      # 9000 (the image default); the Service port becomes WHISPER_SERVICE_URL.
      service:
        port: 9000
      # -- Compute resources for the Whisper container. Empty → no limits set.
      # ASR is CPU/memory heavy; size this for your model on a real deployment.
      resources: {}
    # -- ElevenLabs TTS (text-to-speech). Used for BOTH providers.
    elevenlabs:
      # -- ElevenLabs API key. Stored in the chart-managed voice Secret and
      # injected as ELEVENLABS_API_KEY. Empty → no key (agent falls back to
      # edge-tts inside the pod).
      apiKey: ""
      # -- Optional ElevenLabs voice id (ELEVENLABS_VOICE_ID). Empty → the agent's
      # built-in default voice.
      voiceId: ""
    # -- Groq cloud STT (used ONLY when provider=groq). Stored in the voice Secret
    # and injected as GROQ_API_KEY.
    groq:
      # -- Groq API key. Empty with provider=groq means STT is unconfigured.
      apiKey: ""

# -- Authentication mode for the admin service.
auth:
  # -- Admin auth mode:
  #    "open"   — dev auth, NO OAuth (ADMIN_DEV_AUTH=true). Working UI, but
  #               INSECURE: anyone who can reach the service is authenticated.
  #               Minikube/dev default. Do NOT expose publicly.
  #    "google" — real Google OAuth (NODE_ENV=production). Requires
  #               auth.google.{clientId,clientSecret,allowedEmails}.
  mode: open
  # -- Google OAuth settings (used only when auth.mode=google).
  google:
    # -- Name of an existing Secret holding Google OAuth credentials and the
    # allowed-emails list. When set, clientId/clientSecret/allowedEmails below
    # are ignored and the Deployment sources those three vars via secretKeyRef
    # from this Secret. Leave empty to use the inline values below.
    existingSecret: ""
    # -- Key in existingSecret for GOOGLE_CLIENT_ID.
    clientIdRef: GOOGLE_CLIENT_ID
    # -- Key in existingSecret for GOOGLE_CLIENT_SECRET.
    clientSecretRef: GOOGLE_CLIENT_SECRET
    # -- Key in existingSecret for SHIPWRIGHT_ADMIN_ALLOWED_EMAILS.
    allowedEmailsRef: SHIPWRIGHT_ADMIN_ALLOWED_EMAILS
    # -- Google OAuth client ID (used when existingSecret is empty).
    clientId: ""
    # -- Google OAuth client secret (kept in the chart-managed admin Secret).
    clientSecret: ""
    # -- Comma-separated allow-list of emails permitted to sign in.
    allowedEmails: ""

# -- Bitnami PostgreSQL subchart configuration.
# Disable this (postgresql.enabled=false) to bring your own Postgres and point the
# admin service at an external DATABASE_URL_SHIPWRIGHT_ADMIN.
postgresql:
  # -- Deploy the bundled PostgreSQL subchart.
  enabled: true
  # -- Image overrides. If Bitnami's default registry tags disappear, repoint
  # `image.registry` / `image.repository` at a mirror (see README "Bitnami registry risk").
  image:
    registry: docker.io
    repository: bitnami/postgresql
    # tag intentionally left to the pinned subchart default (concrete, not `latest`).
  auth:
    # -- Default database name created on first boot.
    database: shipwright_admin
    # -- Default application username.
    username: shipwright
    # -- Database password. Left EMPTY on purpose: with no password and no
    # existingSecret, the Bitnami postgresql subchart auto-generates a random
    # password on install. Set it explicitly here, or (preferred for production)
    # point auth.existingSecret at a pre-created Secret. CAVEAT: a Bitnami-generated
    # password is NOT stable across `helm upgrade` — it regenerates unless you use
    # auth.existingSecret. Never ship a known hard-coded default in this chart.
    password: ""
    # -- Source credentials from an existing Secret instead of the values above.
    existingSecret: ""
  # -- Minikube-friendly primary defaults: modest resources, small/toggleable storage.
  primary:
    persistence:
      # -- Toggle persistence off for ephemeral Minikube runs, or size it small.
      enabled: true
      size: 1Gi
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    # -- First-boot init scripts (Bitnami subchart). The SEPARATE metrics database
    # (default "shipwright_metrics") is created by a parent-chart ConfigMap
    # (templates/metrics-postgres-initdb-configmap.yaml), referenced here via
    # scriptsConfigMap below and mounted at /docker-entrypoint-initdb.d. Keeping
    # the metrics event store in its own database (never the admin database) is
    # REQUIRED — sharing it would leave the admin schema non-empty and break
    # admin's `prisma migrate deploy` baseline (Prisma P3005).
    #
    # OVERRIDE-SAFE: the ConfigMap renders the created database name from the
    # shipwright.metrics.databaseName helper — the SAME helper that assembles
    # METRICS_DATABASE_URL in the metrics Secret — so overriding metrics.database.name
    # automatically updates BOTH the created database and the URL the metrics service
    # connects to. No manual edit needed here.
    initdb:
      # The Bitnami subchart tpl-renders scriptsConfigMap, so this resolves to
      # "<release>-metrics-initdb" — the name the parent-chart ConfigMap renders
      # (templates/metrics-postgres-initdb-configmap.yaml). That ConfigMap is gated
      # on postgresql.enabled, matching this reference: whenever the bundled
      # Postgres renders, the ConfigMap it mounts renders too (no dangling mount).
      scriptsConfigMap: '{{ printf "%s-metrics-initdb" .Release.Name }}'

# -- Bring-your-own (external) PostgreSQL for the admin service. Used ONLY when
# postgresql.enabled=false. Point existingSecret at a pre-created Secret holding a
# ready-to-use DATABASE_URL_SHIPWRIGHT_ADMIN connection string; the admin
# Deployment injects it via secretKeyRef. The Secret is NOT chart-managed (you
# create and rotate it), and the chart-managed admin Secret assembles NO DB URL on
# this path, so there is no duplicate/conflicting env. When postgresql.enabled=true
# this block is ignored — the bundled subchart path wins and is unchanged.
externalDatabase:
  # -- Name of a pre-existing Secret holding the admin DB connection string. Empty
  # (default) → no external DB wiring. Set this together with postgresql.enabled=false
  # to enable the external-DB path.
  existingSecret: ""
  # -- Key within existingSecret whose value is the full
  # DATABASE_URL_SHIPWRIGHT_ADMIN connection string. Empty (default) → the template
  # falls back to the key name "DATABASE_URL_SHIPWRIGHT_ADMIN".
  adminUrlKey: ""

# -- Task-store service (@shipwright/task-store) — GitHub Issues-backed task queue. Port 3000.
# Disabled by default — purely additive, safe to deploy without this.
taskStore:
  # -- Whether to render the task-store Deployment and Service.
  enabled: false
  image:
    repository: shipwright-task-store
    tag: ""           # defaults to .Chart.AppVersion when empty
    pullPolicy: ""    # defaults to top-level imagePullPolicy when empty
  service:
    # -- Service type for the task-store service. ClusterIP is Minikube-friendly.
    type: ClusterIP
    port: 3000
  # -- Opt-in external route for the task-store API. Default OFF — the task-store
  # is ClusterIP-only unless this is enabled. When enabled, the configured
  # networking path (ingress or gateway HTTPRoute) exposes the task-store under
  # `pathPrefix`; the prefix is STRIPPED to "/" before traffic reaches the Service
  # (the app serves /tasks, /tokens, /prs, /health at root). Requires
  # taskStore.enabled=true.
  expose:
    # -- Whether to render an external route to the task-store Service.
    enabled: false
    # -- External path prefix the task-store answers on. Stripped to "/" before
    # reaching the Service. More specific than the admin "/" route, so it is not
    # shadowed.
    pathPrefix: /task-store
  replicas: 1
  # -- Compute resources for the task-store container. Minikube-friendly defaults.
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi
  # -- Database wiring for the task-store service.
  database:
    # -- Name of a pre-existing Secret holding DATABASE_URL_SHIPWRIGHT_TASK_STORE.
    # Defaults to "shipwright-secrets" (the canonical cluster secret name).
    # The chart does NOT manage this Secret — create it before deploying.
    existingSecret: "shipwright-secrets"
  # -- Extra env vars to inject into the task-store container. Use for service
  # wiring (e.g. SHIPWRIGHT_TASK_STORE_AGENTS_URL + AGENTS_API_KEY for the
  # scope resolver) without baking those into the chart template.
  extraEnv: []
  # -- ServiceAccount for the task-store pod. Set create: false and name: <sa>
  # to reuse an existing SA (e.g. the umbrella chart'''s Workload Identity SA).
  serviceAccount:
    # -- Whether a ServiceAccount is created for the task-store workload.
    create: true
    # -- Annotations for the task-store ServiceAccount. Generated if empty and create=true.
    annotations: {}
    # -- Name of the task-store ServiceAccount. Generated if empty and create=true.
    name: ""

# -- Cloud SQL Auth Proxy sidecar for the admin pod (GCP Cloud SQL).
# When enabled, a cloud-sql-proxy sidecar is added to the admin Deployment so
# a GCP Cloud SQL instance is reachable at 127.0.0.1:5432 from the admin pod.
# This lets a Cloud SQL DSN (e.g. postgresql://user:pass@127.0.0.1:5432/db) be
# used directly in externalDatabase.existingSecret.
cloudSqlProxy:
  # -- When true, add the cloud-sql-proxy sidecar to the admin Deployment.
  # Default false — purely additive, safe to deploy without this.
  enabled: false
  # -- Proxy container image. Pin to a concrete digest for production.
  image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2
  # -- Cloud SQL instance connection name (project:region:instance). Required when enabled.
  connectionName: ""
  # -- Extra arguments appended after --private-ip and the connection name.
  # Example: ["--max-sigterm-delay=10s", "--structured-logs"]
  args: []
  # -- Compute resources for the proxy sidecar. Empty → no resource limits set.
  resources: {}
