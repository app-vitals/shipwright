apiVersion: v2
name: shipwright
description: >-
  Shipwright Harness — the open-source autonomous delivery agent for Claude Code.
  This chart packages the three Shipwright services (admin, metrics, agent) and an
  optional PostgreSQL dependency for Kubernetes (Minikube-friendly defaults).
type: application
# Chart version (SemVer). Bump on every chart change, independent of appVersion.
# See CHANGELOG.md and the README "Versioning" section — CI enforces this bump
# via `ct lint --check-version-increment`.
version: 0.10.0
# Version of the Shipwright application this chart deploys by default.
appVersion: "0.1.0"
home: https://shipwright-harness.com
sources:
  - https://github.com/app-vitals/shipwright
keywords:
  - shipwright
  - claude-code
  - delivery-agent
  - ci-cd
maintainers:
  - name: Shipwright Harness
    url: https://shipwright-harness.com
# License: MIT (chart + application).
annotations:
  licenses: MIT
  # Artifact Hub change log for this release. Must mirror the matching version
  # entry in CHANGELOG.md (keep the two in sync on every bump).
  artifacthub.io/changes: |
    - kind: added
      description: "externalDatabase block: bring-your-own Postgres for the admin service (externalDatabase.existingSecret + adminUrlKey). Used when postgresql.enabled=false; the admin Deployment injects DATABASE_URL_SHIPWRIGHT_ADMIN from a user-managed Secret. Default off (existingSecret empty)."
    - kind: added
      description: "cloudSqlProxy block: optional cloud-sql-proxy v2 sidecar for the admin pod. Renders only when cloudSqlProxy.enabled=true; defaults: image gcr.io/cloud-sql-connectors/cloud-sql-proxy:2, --private-ip + connectionName args, runAsNonRoot. Default off."
    - kind: added
      description: "metrics.provider block: configurable PostHog provider (existingSecret refs for POSTHOG_PERSONAL_API_KEY/POSTHOG_PROJECT_ID), METRICS_ADMIN_URL, METRICS_BASE_PATH, METRICS_REQUIRE_OWNER_ROLE, and METRICS_INTERNAL_API_KEY (via existingSecret). All additive and gated — defaults preserve existing SQLite/bundled-PG behavior."
dependencies:
  # Bitnami PostgreSQL subchart. Pinned to a chart version whose default image tag
  # is concrete (NOT `latest`), because Bitnami's 2025 catalog change moved newer
  # chart lines to `tag: latest` behind Bitnami Secure. See README for the
  # `bitnamilegacy` mirror fallback if these tags are pulled from the public registry.
  - name: postgresql
    version: "16.7.27"
    repository: oci://registry-1.docker.io/bitnamicharts
    condition: postgresql.enabled
