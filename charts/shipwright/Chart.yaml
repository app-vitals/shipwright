apiVersion: v2
name: shipwright
description: >-
  Shipwright Harness — the open-source autonomous delivery agent for Claude Code.
  This chart packages the three Shipwright services (admin, metrics, agent) and an
  optional PostgreSQL dependency for Kubernetes (Minikube-friendly defaults).
type: application
# Chart version (SemVer). Bump on every chart change, independent of appVersion.
# See CHANGELOG.md and the README "Versioning" section — CI enforces this bump
# via `ct lint --check-version-increment`.
version: 0.10.0
# Version of the Shipwright application this chart deploys by default.
appVersion: "0.1.0"
home: https://shipwright-harness.com
sources:
  - https://github.com/app-vitals/shipwright
keywords:
  - shipwright
  - claude-code
  - delivery-agent
  - ci-cd
maintainers:
  - name: Shipwright Harness
    url: https://shipwright-harness.com
# License: MIT (chart + application).
annotations:
  licenses: MIT
  # Artifact Hub change log for this release. Must mirror the matching version
  # entry in CHANGELOG.md (keep the two in sync on every bump).
  artifacthub.io/changes: |
    - kind: added
      description: "externalDatabase block: bring-your-own-Postgres support for the admin service (existingSecret + optional adminUrlKey). Fail guard when postgresql.enabled=false and existingSecret is empty."
    - kind: added
      description: "cloudSqlProxy sidecar support: enabled/connectionName/image values + required validation for connectionName. Schema block added to values.schema.json with additionalProperties: false."
dependencies:
  # Bitnami PostgreSQL subchart. Pinned to a chart version whose default image tag
  # is concrete (NOT `latest`), because Bitnami's 2025 catalog change moved newer
  # chart lines to `tag: latest` behind Bitnami Secure. See README for the
  # `bitnamilegacy` mirror fallback if these tags are pulled from the public registry.
  - name: postgresql
    version: "16.7.27"
    repository: oci://registry-1.docker.io/bitnamicharts
    condition: postgresql.enabled
