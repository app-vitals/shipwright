# ct-discovered values variant: EKS-flavored overrides.
# Demonstrates AWS Elastic Kubernetes Service tuning — an external/NLB-style
# LoadBalancer exposure, the EBS gp3 storage class for PVCs, and dev (open)
# admin auth. As with the GKE variant, ct renders + installs this on the kind cluster
# (the cloud LB/EBS are not provisioned on kind) to confirm the chart accepts
# provider-flavored values and passes `helm test`.
networking:
  # EKS fronts type=LoadBalancer services with an AWS NLB/ELB.
  type: LoadBalancer

auth:
  # Dev auth (ADMIN_DEV_AUTH=true) — exercises the non-google render path.
  mode: open

admin:
  # Pin repository/tag to the image `helm.yml` builds and side-loads via
  # `kind load docker-image` (tag 0.1.0 = Chart.yaml appVersion) — pullPolicy
  # Never means kind uses ONLY this local image, so the reference here must be
  # an exact match or the pod fails to schedule (ErrImageNeverPull). Overrides
  # values.yaml's GHCR default (DCC-2.1), which is unpublished at PR time.
  image:
    repository: shipwright-admin
    tag: "0.1.0"
    pullPolicy: Never

metrics:
  # pullPolicy Never so kind uses the side-loaded shipwright-metrics image and
  # never reaches a registry. Postgres mode is exercised via the bundled subchart.
  # repository/tag pinned to match the image `helm.yml` side-loads (tag 0.1.0 =
  # Chart.yaml appVersion) — overrides values.yaml's GHCR default (DCC-2.1).
  image:
    repository: shipwright-metrics
    tag: "0.1.0"
    pullPolicy: Never
  provider:
    # Run in offline (fixture) mode — no task-store or admin service available in CI.
    offline: true

agent:
  provisioning:
    persistence:
      enabled: true
      size: 5Gi
      # On real EKS you would set storageClass: gp3 (the EBS CSI gp3 class).
      # Left empty here so `ct install` on a kind cluster binds the PVC against
      # kind's default StorageClass — the cloud class name would never bind.
      storageClass: ""
      accessModes:
        - ReadWriteOnce

postgresql:
  enabled: true
  # Use the `bitnamilegacy` mirror — the default bitnami/postgresql tag is no
  # longer publicly pullable (see README "Bitnami registry risk").
  image:
    registry: docker.io
    repository: bitnamilegacy/postgresql
  auth:
    database: shipwright_admin
    username: shipwright
    # CI-only literal; production should use auth.existingSecret.
    password: ci-eks-postgres
  primary:
    persistence:
      enabled: true
      size: 10Gi
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 1Gi
