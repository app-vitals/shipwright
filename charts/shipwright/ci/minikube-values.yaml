# ct-discovered values variant: small/local (minikube / kind).
# Keeps the install lightweight so `ct install` on a single-node kind cluster
# can pull, schedule, and pass `helm test` quickly. Storage is ephemeral.
networking:
  type: ClusterIP

auth:
  # Dev auth (ADMIN_DEV_AUTH=true), no OAuth — fine for a throwaway local cluster.
  mode: open

admin:
  # Pin repository/tag to the image `helm.yml` builds and side-loads via
  # `kind load docker-image` (tag 0.1.0 = Chart.yaml appVersion) — pullPolicy
  # Never means kind uses ONLY this local image, so the reference here must be
  # an exact match or the pod fails to schedule (ErrImageNeverPull). Overrides
  # values.yaml's GHCR default (DCC-2.1), which is unpublished at PR time.
  image:
    repository: shipwright-admin
    tag: "0.1.0"
    pullPolicy: Never

metrics:
  # pullPolicy Never so kind uses the side-loaded shipwright-metrics image and
  # never reaches a registry. Postgres mode is exercised via the bundled subchart.
  # repository/tag pinned to match the image `helm.yml` side-loads (tag 0.1.0 =
  # Chart.yaml appVersion) — overrides values.yaml's GHCR default (DCC-2.1).
  image:
    repository: shipwright-metrics
    tag: "0.1.0"
    pullPolicy: Never
  provider:
    # Run in offline (fixture) mode — no task-store or admin service available in CI.
    offline: true

agent:
  provisioning:
    # Exercise the agent-provisioning RBAC path on kind. These are core RBAC
    # objects (Role/RoleBinding) + a ServiceAccount — no CRDs — so a single-node
    # kind cluster creates them without extra setup. Admin only attempts a real
    # provision when an agent is created via the API, so `ct install` + `helm
    # test` (which never create an agent) are unaffected; this just verifies the
    # RBAC + admin env contract apply cleanly.
    enabled: true
    persistence:
      # No PVC churn on a throwaway local cluster.
      enabled: false

postgresql:
  enabled: true
  # Bitnami moved its public catalog behind "Bitnami Secure" in 2025, so the
  # default docker.io/bitnami/postgresql tag is no longer publicly pullable.
  # Point CI installs at the `bitnamilegacy` mirror (the fallback documented in
  # the chart README "Bitnami registry risk" section) so `ct install` can pull.
  image:
    registry: docker.io
    repository: bitnamilegacy/postgresql
  # Set an explicit password so the install is deterministic across CI re-runs
  # (a Bitnami auto-generated password is fine for a throwaway cluster, but a
  # fixed value keeps `helm test`/connectivity checks reproducible). This is a
  # CI-only, non-secret literal for an ephemeral single-node cluster.
  auth:
    database: shipwright_admin
    username: shipwright
    password: ci-local-postgres
  primary:
    persistence:
      # Ephemeral storage — no PVC on the local node.
      enabled: false
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 250m
        memory: 256Mi
