suite: admin Deployment / Service / ServiceAccount workloads
# HD-3.1 adds the admin workload templates. These assert the structural facts:
# image (tag defaults to appVersion), container port 3001, /health liveness +
# readiness probes, ServiceAccount wiring, Service shape, and the DATABASE_URL
# wiring to the bundled PostgreSQL subchart (assembled in the admin Secret).
tests:
  - it: renders the admin Deployment with the appVersion-defaulted image and port 3001
    template: templates/admin-deployment.yaml
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: spec.template.spec.containers[0].image
          value: shipwright-admin:0.1.0
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 3001

  - it: sets liveness and readiness probes against /health on port 3001
    template: templates/admin-deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /health
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.port
          value: 3001
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /health
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.port
          value: 3001

  - it: wires the ServiceAccount and standard selector labels onto the Deployment
    template: templates/admin-deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: r-shipwright-admin
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/component"]
          value: admin
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/name"]
          value: shipwright
    release:
      name: r

  - it: applies the configured admin resources
    template: templates/admin-deployment.yaml
    set:
      admin.resources:
        requests:
          cpu: 111m
          memory: 222Mi
        limits:
          cpu: 333m
          memory: 444Mi
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.requests.cpu
          value: 111m
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: 444Mi

  - it: wires DATABASE_URL_SHIPWRIGHT_ADMIN from the admin Secret when postgresql is enabled
    template: templates/admin-deployment.yaml
    set:
      postgresql.enabled: true
    release:
      name: r
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DATABASE_URL_SHIPWRIGHT_ADMIN
            valueFrom:
              secretKeyRef:
                name: r-shipwright-admin
                key: DATABASE_URL_SHIPWRIGHT_ADMIN

  - it: fails with a clear error when postgresql is disabled and no external secret is set
    template: templates/admin-deployment.yaml
    set:
      postgresql.enabled: false
    asserts:
      - failedTemplate:
          errorMessage: "externalDatabase.existingSecret is required when postgresql.enabled=false"
    release:
      name: r

  # ── admin.encryptionKeys.existingSecret ──────────────────────────────────

  - it: sources SHIPWRIGHT_SESSION_SECRET and SHIPWRIGHT_ENCRYPTION_KEY from existingSecret when set
    template: templates/admin-deployment.yaml
    set:
      admin.encryptionKeys.existingSecret: my-keys-secret
      admin.encryptionKeys.encryptionKeyRef: SHIPWRIGHT_ENCRYPTION_KEY
      admin.encryptionKeys.sessionSecretRef: SHIPWRIGHT_SESSION_SECRET
    release:
      name: r
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SHIPWRIGHT_SESSION_SECRET
            valueFrom:
              secretKeyRef:
                name: my-keys-secret
                key: SHIPWRIGHT_SESSION_SECRET
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SHIPWRIGHT_ENCRYPTION_KEY
            valueFrom:
              secretKeyRef:
                name: my-keys-secret
                key: SHIPWRIGHT_ENCRYPTION_KEY

  - it: sources session+encryption keys from the chart-managed Secret by default (no existingSecret)
    template: templates/admin-deployment.yaml
    release:
      name: r
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SHIPWRIGHT_SESSION_SECRET
            valueFrom:
              secretKeyRef:
                name: r-shipwright-admin
                key: SHIPWRIGHT_SESSION_SECRET
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SHIPWRIGHT_ENCRYPTION_KEY
            valueFrom:
              secretKeyRef:
                name: r-shipwright-admin
                key: SHIPWRIGHT_ENCRYPTION_KEY

  # ── auth.google.existingSecret ───────────────────────────────────────────

  - it: sources GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET, and SHIPWRIGHT_ADMIN_ALLOWED_EMAILS from existingSecret when set
    template: templates/admin-deployment.yaml
    set:
      auth.mode: google
      auth.google.existingSecret: my-google-secret
      auth.google.clientIdRef: GOOGLE_CLIENT_ID
      auth.google.clientSecretRef: GOOGLE_CLIENT_SECRET
      auth.google.allowedEmailsRef: SHIPWRIGHT_ADMIN_ALLOWED_EMAILS
    release:
      name: r
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: GOOGLE_CLIENT_ID
            valueFrom:
              secretKeyRef:
                name: my-google-secret
                key: GOOGLE_CLIENT_ID
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: GOOGLE_CLIENT_SECRET
            valueFrom:
              secretKeyRef:
                name: my-google-secret
                key: GOOGLE_CLIENT_SECRET
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SHIPWRIGHT_ADMIN_ALLOWED_EMAILS
            valueFrom:
              secretKeyRef:
                name: my-google-secret
                key: SHIPWRIGHT_ADMIN_ALLOWED_EMAILS

  - it: sources Google OAuth from the chart-managed Secret by default (no existingSecret)
    template: templates/admin-deployment.yaml
    set:
      auth.mode: google
      auth.google.clientId: cid
      auth.google.clientSecret: csec
      auth.google.allowedEmails: dev@example.com
    release:
      name: r
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: GOOGLE_CLIENT_ID
            valueFrom:
              secretKeyRef:
                name: r-shipwright-admin
                key: GOOGLE_CLIENT_ID
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: GOOGLE_CLIENT_SECRET
            valueFrom:
              secretKeyRef:
                name: r-shipwright-admin
                key: GOOGLE_CLIENT_SECRET
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SHIPWRIGHT_ADMIN_ALLOWED_EMAILS
            value: "dev@example.com"

  # ── admin.appBaseUrl ──────────────────────────────────────────────────────

  - it: injects SHIPWRIGHT_ADMIN_APP_BASE_URL when admin.appBaseUrl is set
    template: templates/admin-deployment.yaml
    set:
      admin.appBaseUrl: "https://shipwright.example.com"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SHIPWRIGHT_ADMIN_APP_BASE_URL
            value: "https://shipwright.example.com"

  - it: omits SHIPWRIGHT_ADMIN_APP_BASE_URL when admin.appBaseUrl is empty (default)
    template: templates/admin-deployment.yaml
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: SHIPWRIGHT_ADMIN_APP_BASE_URL

  # ── admin.taskStorePublicUrl ──────────────────────────────────────────────

  - it: injects SHIPWRIGHT_TASK_STORE_PUBLIC_URL when admin.taskStorePublicUrl is set
    template: templates/admin-deployment.yaml
    set:
      admin.taskStorePublicUrl: "https://shipwright.example.com/task-store"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SHIPWRIGHT_TASK_STORE_PUBLIC_URL
            value: "https://shipwright.example.com/task-store"

  - it: omits SHIPWRIGHT_TASK_STORE_PUBLIC_URL when admin.taskStorePublicUrl is empty (default)
    template: templates/admin-deployment.yaml
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: SHIPWRIGHT_TASK_STORE_PUBLIC_URL

  # ── admin.extraEnv ────────────────────────────────────────────────────────

  - it: appends admin.extraEnv entries to the container env
    template: templates/admin-deployment.yaml
    set:
      admin.extraEnv:
        - name: MY_CUSTOM_VAR
          value: "hello"
        - name: FROM_SECRET
          valueFrom:
            secretKeyRef:
              name: my-secret
              key: MY_KEY
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MY_CUSTOM_VAR
            value: "hello"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: FROM_SECRET
            valueFrom:
              secretKeyRef:
                name: my-secret
                key: MY_KEY

  - it: renders no extra env vars when admin.extraEnv is empty (default)
    template: templates/admin-deployment.yaml
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: MY_CUSTOM_VAR

  # ── service / serviceaccount ──────────────────────────────────────────────

  - it: renders the admin Service (ClusterIP) mapping the service port to targetPort 3001
    template: templates/admin-service.yaml
    asserts:
      - isKind:
          of: Service
      - equal:
          path: spec.type
          value: ClusterIP
      - equal:
          path: spec.ports[0].port
          value: 3001
      - equal:
          path: spec.ports[0].targetPort
          value: 3001
      - equal:
          path: spec.selector["app.kubernetes.io/component"]
          value: admin

  - it: honors a custom admin.service.type and port
    template: templates/admin-service.yaml
    set:
      admin.service.type: NodePort
      admin.service.port: 30080
    asserts:
      - equal:
          path: spec.type
          value: NodePort
      - equal:
          path: spec.ports[0].port
          value: 30080
      - equal:
          path: spec.ports[0].targetPort
          value: 3001

  - it: creates the admin ServiceAccount by default
    template: templates/admin-serviceaccount.yaml
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.name
          value: r-shipwright-admin
    release:
      name: r

  - it: skips the admin ServiceAccount when create=false
    template: templates/admin-serviceaccount.yaml
    set:
      admin.serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: renders no admin workloads when admin.enabled=false
    set:
      admin.enabled: false
    documentSelector:
      path: metadata.labels["app.kubernetes.io/component"]
      value: admin
      skipEmptyTemplates: true
    templates:
      - templates/admin-deployment.yaml
      - templates/admin-service.yaml
      - templates/admin-serviceaccount.yaml
      - templates/admin-secret.yaml
    asserts:
      - hasDocuments:
          count: 0

  # ── Chat-service wiring (chat.enabled + chat.adminToken) ─────────────────

  - it: does not inject chat-service env by default
    template: templates/admin-deployment.yaml
    release:
      name: r
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: SHIPWRIGHT_CHAT_SERVICE_URL
            value: http://r-shipwright-chat:3000

  - it: does not inject chat-service env when chat.enabled but adminToken unset
    template: templates/admin-deployment.yaml
    set:
      chat.enabled: true
    release:
      name: r
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: SHIPWRIGHT_CHAT_SERVICE_URL
            value: http://r-shipwright-chat:3000

  - it: injects the in-cluster chat URL + admin token when chat.enabled and adminToken set
    template: templates/admin-deployment.yaml
    set:
      chat.enabled: true
      chat.adminToken.existingSecret: shipwright-secrets
    release:
      name: r
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SHIPWRIGHT_CHAT_SERVICE_URL
            value: http://r-shipwright-chat:3000
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SHIPWRIGHT_CHAT_SERVICE_ADMIN_TOKEN
            valueFrom:
              secretKeyRef:
                name: shipwright-secrets
                key: SHIPWRIGHT_CHAT_SERVICE_ADMIN_TOKEN

  - it: chat admin token honors a custom secret name and key
    template: templates/admin-deployment.yaml
    set:
      chat.enabled: true
      chat.adminToken.existingSecret: my-chat-tokens
      chat.adminToken.key: CHAT_ADMIN_RAW
    release:
      name: r
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SHIPWRIGHT_CHAT_SERVICE_ADMIN_TOKEN
            valueFrom:
              secretKeyRef:
                name: my-chat-tokens
                key: CHAT_ADMIN_RAW

  # ── admin.sentry ──────────────────────────────────────────────────────────

  - it: does not wire SENTRY_DSN or SENTRY_ENVIRONMENT by default
    template: templates/admin-deployment.yaml
    release:
      name: r
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: SENTRY_DSN
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: SENTRY_ENVIRONMENT

  - it: wires SENTRY_DSN from an existingSecret and SENTRY_ENVIRONMENT when configured
    template: templates/admin-deployment.yaml
    set:
      admin.sentry.dsn.existingSecret: my-sentry-secret
      admin.sentry.environment: production
    release:
      name: r
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SENTRY_DSN
            valueFrom:
              secretKeyRef:
                name: my-sentry-secret
                key: SENTRY_DSN
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SENTRY_ENVIRONMENT
            value: production
