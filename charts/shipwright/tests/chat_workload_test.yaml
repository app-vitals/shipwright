suite: chat Deployment / Service workloads
# CHT-2.1 adds the chat workload templates. These assert the structural
# facts: image (pinned to the GHCR default), container port 3000, /health
# liveness + readiness probes, DATABASE_URL_SHIPWRIGHT_CHAT secret wiring
# (default and custom existingSecret), extraEnv appended, Service shape,
# and that no resources render when chat.enabled=false.
tests:
  - it: renders the chat Deployment with the GHCR-pinned image and port 3000
    template: templates/chat-deployment.yaml
    set:
      chat.enabled: true
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: spec.template.spec.containers[0].image
          value: ghcr.io/app-vitals/shipwright-chat:chat-v0.38.0
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 3000

  - it: sets liveness and readiness probes against /health on port 3000
    template: templates/chat-deployment.yaml
    set:
      chat.enabled: true
    asserts:
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /health
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.port
          value: 3000
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /health
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.port
          value: 3000

  - it: wires DATABASE_URL_SHIPWRIGHT_CHAT from the default existingSecret (shipwright-secrets)
    template: templates/chat-deployment.yaml
    set:
      chat.enabled: true
    release:
      name: r
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DATABASE_URL_SHIPWRIGHT_CHAT
            valueFrom:
              secretKeyRef:
                name: shipwright-secrets
                key: DATABASE_URL_SHIPWRIGHT_CHAT

  - it: wires DATABASE_URL_SHIPWRIGHT_CHAT from a custom existingSecret
    template: templates/chat-deployment.yaml
    set:
      chat.enabled: true
      chat.database.existingSecret: my-chat-secret
    release:
      name: r
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DATABASE_URL_SHIPWRIGHT_CHAT
            valueFrom:
              secretKeyRef:
                name: my-chat-secret
                key: DATABASE_URL_SHIPWRIGHT_CHAT

  - it: appends chat.extraEnv entries after the standard env block
    template: templates/chat-deployment.yaml
    set:
      chat.enabled: true
      chat.extraEnv:
        - name: SHIPWRIGHT_CHAT_AGENTS_URL
          value: "http://admin:3001"
        - name: SHIPWRIGHT_CHAT_AGENTS_API_KEY
          value: "test-key"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SHIPWRIGHT_CHAT_AGENTS_URL
            value: "http://admin:3001"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SHIPWRIGHT_CHAT_AGENTS_API_KEY
            value: "test-key"

  - it: renders the chat Service (ClusterIP) mapping port 3000 to targetPort 3000
    template: templates/chat-service.yaml
    set:
      chat.enabled: true
    asserts:
      - isKind:
          of: Service
      - equal:
          path: spec.type
          value: ClusterIP
      - equal:
          path: spec.ports[0].port
          value: 3000
      - equal:
          path: spec.ports[0].targetPort
          value: 3000
      - equal:
          path: spec.selector["app.kubernetes.io/component"]
          value: chat

  - it: renders no chat workloads when chat.enabled=false
    set:
      chat.enabled: false
    templates:
      - templates/chat-deployment.yaml
      - templates/chat-service.yaml
    asserts:
      - hasDocuments:
          count: 0

  # ── Admin-token seeding (chat.adminToken) ────────────────────────────────

  - it: does not inject CHAT_SEED_ADMIN_TOKEN by default (adminToken unset)
    template: templates/chat-deployment.yaml
    set:
      chat.enabled: true
    release:
      name: r
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: CHAT_SEED_ADMIN_TOKEN
            valueFrom:
              secretKeyRef:
                name: shipwright-secrets
                key: SHIPWRIGHT_CHAT_SERVICE_ADMIN_TOKEN

  - it: seeds CHAT_SEED_ADMIN_TOKEN from chat.adminToken.existingSecret (default key)
    template: templates/chat-deployment.yaml
    set:
      chat.enabled: true
      chat.adminToken.existingSecret: shipwright-secrets
    release:
      name: r
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: CHAT_SEED_ADMIN_TOKEN
            valueFrom:
              secretKeyRef:
                name: shipwright-secrets
                key: SHIPWRIGHT_CHAT_SERVICE_ADMIN_TOKEN

  - it: seeds CHAT_SEED_ADMIN_TOKEN honoring a custom secret name and key
    template: templates/chat-deployment.yaml
    set:
      chat.enabled: true
      chat.adminToken.existingSecret: my-chat-tokens
      chat.adminToken.key: CHAT_ADMIN_RAW
    release:
      name: r
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: CHAT_SEED_ADMIN_TOKEN
            valueFrom:
              secretKeyRef:
                name: my-chat-tokens
                key: CHAT_ADMIN_RAW
