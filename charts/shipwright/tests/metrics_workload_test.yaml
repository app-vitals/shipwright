suite: metrics Deployment / Service / ServiceAccount workloads
# HD-3.2 adds the metrics workload templates (mirrors the admin pattern). These
# assert the structural facts: image (tag defaults to appVersion), container port
# 3460, /health liveness + readiness probes, ServiceAccount wiring, Service shape,
# the postgres-mode env (METRICS_API_PORT), and the
# METRICS_DATABASE_URL wiring to the bundled PostgreSQL subchart (assembled in the
# metrics Secret).
tests:
  - it: renders the metrics Deployment with the appVersion-defaulted image and port 3460
    template: templates/metrics-deployment.yaml
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: spec.template.spec.containers[0].image
          value: shipwright-metrics:0.1.0
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 3460

  - it: sets liveness and readiness probes against /health on port 3460
    template: templates/metrics-deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /health
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.port
          value: 3460
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /health
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.port
          value: 3460

  - it: binds METRICS_API_PORT env
    template: templates/metrics-deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: METRICS_API_PORT
            value: "3460"

  - it: wires SHIPWRIGHT_SESSION_SECRET from the metrics Secret (dashboard session JWT)
    template: templates/metrics-deployment.yaml
    release:
      name: r
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SHIPWRIGHT_SESSION_SECRET
            valueFrom:
              secretKeyRef:
                name: r-shipwright-metrics
                key: SHIPWRIGHT_SESSION_SECRET

  - it: sources SHIPWRIGHT_SESSION_SECRET from a caller-managed Secret when metrics.sessionSecret.existingSecret is set
    # Point metrics at the same Secret the admin uses so admin-minted dashboard
    # JWTs validate at the metrics service (shared-Gateway dashboards).
    template: templates/metrics-deployment.yaml
    release:
      name: r
    set:
      metrics.sessionSecret.existingSecret: shipwright-secrets
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SHIPWRIGHT_SESSION_SECRET
            valueFrom:
              secretKeyRef:
                name: shipwright-secrets
                key: SHIPWRIGHT_SESSION_SECRET
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: SHIPWRIGHT_SESSION_SECRET
            valueFrom:
              secretKeyRef:
                name: r-shipwright-metrics
                key: SHIPWRIGHT_SESSION_SECRET

  - it: honors a custom metrics.sessionSecret.sessionSecretRef key
    template: templates/metrics-deployment.yaml
    release:
      name: r
    set:
      metrics.sessionSecret.existingSecret: shipwright-secrets
      metrics.sessionSecret.sessionSecretRef: MY_SESSION_KEY
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SHIPWRIGHT_SESSION_SECRET
            valueFrom:
              secretKeyRef:
                name: shipwright-secrets
                key: MY_SESSION_KEY

  - it: wires the ServiceAccount and standard selector labels onto the Deployment
    template: templates/metrics-deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: r-shipwright-metrics
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/component"]
          value: metrics
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/name"]
          value: shipwright
    release:
      name: r

  - it: applies the configured metrics resources
    template: templates/metrics-deployment.yaml
    set:
      metrics.resources:
        requests:
          cpu: 111m
          memory: 222Mi
        limits:
          cpu: 333m
          memory: 444Mi
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.requests.cpu
          value: 111m
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: 444Mi

  - it: wires METRICS_DATABASE_URL from the metrics Secret when postgresql is enabled
    template: templates/metrics-deployment.yaml
    set:
      postgresql.enabled: true
    release:
      name: r
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: METRICS_DATABASE_URL
            valueFrom:
              secretKeyRef:
                name: r-shipwright-metrics
                key: METRICS_DATABASE_URL

  - it: omits METRICS_DATABASE_URL env when postgresql is disabled (bring-your-own DB)
    template: templates/metrics-deployment.yaml
    set:
      postgresql.enabled: false
      externalDatabase.existingSecret: my-db-secret
    release:
      name: r
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: METRICS_DATABASE_URL
            valueFrom:
              secretKeyRef:
                name: r-shipwright-metrics
                key: METRICS_DATABASE_URL

  - it: renders the metrics Service (ClusterIP) mapping the service port to targetPort 3460
    template: templates/metrics-service.yaml
    asserts:
      - isKind:
          of: Service
      - equal:
          path: spec.type
          value: ClusterIP
      - equal:
          path: spec.ports[0].port
          value: 3460
      - equal:
          path: spec.ports[0].targetPort
          value: 3460
      - equal:
          path: spec.selector["app.kubernetes.io/component"]
          value: metrics

  - it: honors a custom metrics.service.type and port
    template: templates/metrics-service.yaml
    set:
      metrics.service.type: NodePort
      metrics.service.port: 30460
    asserts:
      - equal:
          path: spec.type
          value: NodePort
      - equal:
          path: spec.ports[0].port
          value: 30460
      - equal:
          path: spec.ports[0].targetPort
          value: 3460

  - it: creates the metrics ServiceAccount by default
    template: templates/metrics-serviceaccount.yaml
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.name
          value: r-shipwright-metrics
    release:
      name: r

  - it: skips the metrics ServiceAccount when create=false
    template: templates/metrics-serviceaccount.yaml
    set:
      metrics.serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: renders no metrics workloads when metrics.enabled=false
    set:
      metrics.enabled: false
    documentSelector:
      path: metadata.labels["app.kubernetes.io/component"]
      value: metrics
      skipEmptyTemplates: true
    templates:
      - templates/metrics-deployment.yaml
      - templates/metrics-service.yaml
      - templates/metrics-serviceaccount.yaml
      - templates/metrics-secret.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: injects POSTHOG_PERSONAL_API_KEY and POSTHOG_PROJECT_ID via secretKeyRef when posthog existingSecret is set
    template: templates/metrics-deployment.yaml
    release:
      name: r
    set:
      metrics.provider.posthog.existingSecret: my-posthog-secret
      metrics.provider.posthog.personalApiKeyRef: POSTHOG_PERSONAL_API_KEY
      metrics.provider.posthog.projectIdRef: POSTHOG_PROJECT_ID
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POSTHOG_PERSONAL_API_KEY
            valueFrom:
              secretKeyRef:
                name: my-posthog-secret
                key: POSTHOG_PERSONAL_API_KEY
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POSTHOG_PROJECT_ID
            valueFrom:
              secretKeyRef:
                name: my-posthog-secret
                key: POSTHOG_PROJECT_ID

  - it: omits PostHog env vars in the default path (no existingSecret set)
    template: templates/metrics-deployment.yaml
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: POSTHOG_PERSONAL_API_KEY
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: POSTHOG_PROJECT_ID

  - it: injects METRICS_ADMIN_URL as a literal env when adminUrl is set
    template: templates/metrics-deployment.yaml
    set:
      metrics.provider.adminUrl: "http://admin-service:3001"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: METRICS_ADMIN_URL
            value: "http://admin-service:3001"

  - it: omits METRICS_ADMIN_URL when adminUrl is empty (default)
    template: templates/metrics-deployment.yaml
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: METRICS_ADMIN_URL

  - it: injects METRICS_TASK_STORE_URL as a literal env when taskStoreUrl is set (selects TASKSTORE mode)
    template: templates/metrics-deployment.yaml
    set:
      metrics.provider.taskStoreUrl: "http://shipwright-task-store:3000"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: METRICS_TASK_STORE_URL
            value: "http://shipwright-task-store:3000"

  - it: omits METRICS_TASK_STORE_URL when taskStoreUrl is empty (default)
    template: templates/metrics-deployment.yaml
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: METRICS_TASK_STORE_URL

  - it: injects METRICS_TASK_STORE_TOKEN via secretKeyRef when taskStoreToken.existingSecret is set
    template: templates/metrics-deployment.yaml
    set:
      metrics.provider.taskStoreToken.existingSecret: my-task-store-secret
      metrics.provider.taskStoreToken.key: METRICS_TASK_STORE_TOKEN
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: METRICS_TASK_STORE_TOKEN
            valueFrom:
              secretKeyRef:
                name: my-task-store-secret
                key: METRICS_TASK_STORE_TOKEN

  - it: omits METRICS_TASK_STORE_TOKEN when taskStoreToken.existingSecret is empty (default)
    template: templates/metrics-deployment.yaml
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: METRICS_TASK_STORE_TOKEN

  - it: injects METRICS_BASE_PATH as a literal env when basePath is set
    template: templates/metrics-deployment.yaml
    set:
      metrics.provider.basePath: "/dashboard"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: METRICS_BASE_PATH
            value: "/dashboard"

  - it: omits METRICS_BASE_PATH when basePath is empty (default)
    template: templates/metrics-deployment.yaml
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: METRICS_BASE_PATH

  - it: injects METRICS_REQUIRE_OWNER_ROLE=true when requireOwnerRole is true
    template: templates/metrics-deployment.yaml
    set:
      metrics.provider.requireOwnerRole: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: METRICS_REQUIRE_OWNER_ROLE
            value: "true"

  - it: omits METRICS_REQUIRE_OWNER_ROLE when requireOwnerRole is false (default)
    template: templates/metrics-deployment.yaml
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: METRICS_REQUIRE_OWNER_ROLE
            value: "true"

  - it: injects METRICS_INTERNAL_API_KEY via secretKeyRef when internalKey.existingSecret is set
    template: templates/metrics-deployment.yaml
    release:
      name: r
    set:
      metrics.provider.internalKey.existingSecret: my-internal-secret
      metrics.provider.internalKey.key: METRICS_INTERNAL_API_KEY
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: METRICS_INTERNAL_API_KEY
            valueFrom:
              secretKeyRef:
                name: my-internal-secret
                key: METRICS_INTERNAL_API_KEY

  - it: omits METRICS_INTERNAL_API_KEY when internalKey.existingSecret is empty (default)
    template: templates/metrics-deployment.yaml
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: METRICS_INTERNAL_API_KEY
