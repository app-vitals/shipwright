{{- if and .Values.admin.enabled .Values.admin.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "shipwright.admin.serviceAccountName" . }}
  labels:
    {{- include "shipwright.admin.labels" . | nindent 4 }}
  {{- with .Values.admin.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
