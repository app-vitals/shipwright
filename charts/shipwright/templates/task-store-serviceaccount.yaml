{{- if and .Values.taskStore.enabled .Values.taskStore.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "shipwright.taskStore.serviceAccountName" . }}
  labels:
    {{- include "shipwright.taskStore.labels" . | nindent 4 }}
  {{- with .Values.taskStore.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
