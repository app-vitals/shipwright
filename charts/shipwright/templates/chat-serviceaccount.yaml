{{- if and .Values.chat.enabled .Values.chat.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "shipwright.chat.serviceAccountName" . }}
  labels:
    {{- include "shipwright.chat.labels" . | nindent 4 }}
  {{- with .Values.chat.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
