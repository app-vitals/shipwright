{{- if .Values.admin.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "shipwright.admin.fullname" . }}
  labels:
    {{- include "shipwright.admin.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.admin.replicas | default 1 }}
  selector:
    matchLabels:
      {{- include "shipwright.admin.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "shipwright.admin.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "shipwright.admin.serviceAccountName" . }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- range . }}
        - name: {{ . }}
        {{- end }}
      {{- end }}
      {{- if .Values.postgresql.enabled }}
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z {{ include "shipwright.postgresql.fullname" . }} 5432; do echo "waiting for postgresql..."; sleep 2; done']
      {{- end }}
      containers:
        - name: admin
          image: "{{ with .Values.global.imageRegistry }}{{ . }}/{{ end }}{{ .Values.admin.image.repository }}:{{ .Values.admin.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.admin.image.pullPolicy | default .Values.imagePullPolicy }}
          ports:
            - name: http
              containerPort: 3001
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          env:
            # Bind the admin service to the chart-standard port 3001 (the app
            # defaults to 3000 via PORT; the chart standardizes on 3001).
            - name: PORT
              value: "3001"
            {{- if .Values.postgresql.enabled }}
            # Assembled in the admin Secret so the Postgres password is never in
            # plaintext Deployment env.
            - name: DATABASE_URL_SHIPWRIGHT_ADMIN
              valueFrom:
                secretKeyRef:
                  name: {{ include "shipwright.admin.secretName" . }}
                  key: DATABASE_URL_SHIPWRIGHT_ADMIN
            {{- else if and (not .Values.postgresql.enabled) (empty .Values.externalDatabase.existingSecret) }}
            {{- fail "externalDatabase.existingSecret is required when postgresql.enabled=false" }}
            {{- else if .Values.externalDatabase.existingSecret }}
            # Bring-your-own (external) Postgres: inject DATABASE_URL_SHIPWRIGHT_ADMIN
            # from a user-managed Secret. The chart neither assembles nor owns this
            # Secret, so the admin Secret stays free of any DB URL (no duplicate env).
            # adminUrlKey defaults to DATABASE_URL_SHIPWRIGHT_ADMIN when left empty.
            - name: DATABASE_URL_SHIPWRIGHT_ADMIN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalDatabase.existingSecret }}
                  key: {{ .Values.externalDatabase.adminUrlKey | default "DATABASE_URL_SHIPWRIGHT_ADMIN" }}
            {{- end }}
            {{- if .Values.admin.encryptionKeys.existingSecret }}
            # admin.encryptionKeys.existingSecret: source these two keys from a
            # caller-managed Secret so they survive across fresh namespace installs
            # without generating random values that can't decrypt existing data.
            - name: SHIPWRIGHT_SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.admin.encryptionKeys.existingSecret }}
                  key: {{ .Values.admin.encryptionKeys.sessionSecretRef | default "SHIPWRIGHT_SESSION_SECRET" }}
            - name: SHIPWRIGHT_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.admin.encryptionKeys.existingSecret }}
                  key: {{ .Values.admin.encryptionKeys.encryptionKeyRef | default "SHIPWRIGHT_ENCRYPTION_KEY" }}
            {{- else }}
            - name: SHIPWRIGHT_SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "shipwright.admin.secretName" . }}
                  key: SHIPWRIGHT_SESSION_SECRET
            - name: SHIPWRIGHT_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "shipwright.admin.secretName" . }}
                  key: SHIPWRIGHT_ENCRYPTION_KEY
            {{- end }}
            {{- if .Values.admin.appBaseUrl }}
            # admin.appBaseUrl: public host for OAuth redirect URIs so they use
            # the real hostname instead of localhost:3001 behind a Gateway.
            - name: SHIPWRIGHT_ADMIN_APP_BASE_URL
              value: {{ .Values.admin.appBaseUrl | quote }}
            {{- end }}
            {{- if or (eq .Values.auth.mode "open") (eq .Values.auth.mode "none") }}
            # auth.mode=open (or deprecated alias "none") — dev auth, NO OAuth.
            # Insecure: do not expose publicly. NODE_ENV is intentionally NOT set
            # to production so the dev-auth path stays enabled.
            - name: ADMIN_DEV_AUTH
              value: "true"
            {{- else if eq .Values.auth.mode "google" }}
            # auth.mode=google — real Google OAuth. Production hardening on.
            - name: NODE_ENV
              value: "production"
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "shipwright.admin.secretName" . }}
                  key: GOOGLE_CLIENT_ID
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "shipwright.admin.secretName" . }}
                  key: GOOGLE_CLIENT_SECRET
            - name: SHIPWRIGHT_ADMIN_ALLOWED_EMAILS
              value: {{ .Values.auth.google.allowedEmails | quote }}
            {{- end }}
            {{- if .Values.agent.provisioning.enabled }}
            # ── Agent-provisioning env contract (HD-4.2) ──────────────────────
            # Injected ONLY when agent.provisioning.enabled. These are exactly the
            # vars admin/src/main.ts buildProvisioner reads — when absent (default),
            # main.ts returns a NoopAgentProvisioner (no cluster access). Do not add
            # vars main.ts ignores.
            - name: SHIPWRIGHT_K8S_PROVISIONING
              value: "enabled"
            # Namespace via the downward API — the pod's own namespace, no static
            # value baked into the chart.
            - name: SHIPWRIGHT_K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: SHIPWRIGHT_AGENT_IMAGE
              value: {{ .Values.agent.provisioning.image.repository | quote }}
            - name: SHIPWRIGHT_AGENT_IMAGE_TAG
              value: {{ .Values.agent.provisioning.image.tag | default .Chart.AppVersion | quote }}
            - name: SHIPWRIGHT_AGENT_REPLICAS
              value: {{ .Values.agent.provisioning.replicas | quote }}
            # In-cluster admin/gateway URL the provisioner hands to agent pods.
            # Defaults to the admin Service DNS name + port; override via
            # agent.provisioning.apiUrl for an external gateway.
            - name: SHIPWRIGHT_API_URL
              value: {{ .Values.agent.provisioning.apiUrl | default (printf "http://%s:%v" (include "shipwright.admin.fullname" .) .Values.admin.service.port) | quote }}
            # Static admin Deployment name (this Deployment).
            - name: SHIPWRIGHT_ADMIN_DEPLOYMENT_NAME
              value: {{ include "shipwright.admin.fullname" . | quote }}
            {{- with .Values.agent.provisioning.adminDeploymentUid }}
            # Optional: the parent Deployment's UID is NOT exposed to its pods via
            # the downward API (that surfaces the POD uid, not the Deployment's), so
            # it can only come from an explicit override. Omitted when unset —
            # ownerRef propagation through KubernetesClient is a separate follow-up
            # (HD-1.4); a missing UID is acceptable rather than a fabricated one.
            - name: SHIPWRIGHT_ADMIN_DEPLOYMENT_UID
              value: {{ . | quote }}
            {{- end }}
            {{- end }}
            {{- with .Values.admin.extraEnv }}
            # admin.extraEnv: caller-supplied env vars appended last so they can
            # override anything above if needed.
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.admin.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- if .Values.cloudSqlProxy.enabled }}
        - name: cloud-sql-proxy
          image: {{ .Values.cloudSqlProxy.image }}
          args:
            - --private-ip
            - {{ required "cloudSqlProxy.connectionName is required when cloudSqlProxy.enabled=true" .Values.cloudSqlProxy.connectionName | quote }}
            {{- range .Values.cloudSqlProxy.args }}
            - {{ . | quote }}
            {{- end }}
          securityContext:
            runAsNonRoot: true
          {{- with .Values.cloudSqlProxy.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- end }}
{{- end }}
