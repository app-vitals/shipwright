{{- if .Values.admin.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "shipwright.admin.fullname" . }}
  labels:
    {{- include "shipwright.admin.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.admin.replicas | default 1 }}
  selector:
    matchLabels:
      {{- include "shipwright.admin.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "shipwright.admin.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "shipwright.admin.serviceAccountName" . }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- range . }}
        - name: {{ . }}
        {{- end }}
      {{- end }}
      {{- if .Values.postgresql.enabled }}
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z {{ include "shipwright.postgresql.fullname" . }} 5432; do echo "waiting for postgresql..."; sleep 2; done']
      {{- end }}
      containers:
        - name: admin
          image: "{{ with .Values.global.imageRegistry }}{{ . }}/{{ end }}{{ .Values.admin.image.repository }}:{{ .Values.admin.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.admin.image.pullPolicy | default .Values.imagePullPolicy }}
          ports:
            - name: http
              containerPort: 3001
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          env:
            # Bind the admin service to the chart-standard port 3001 (the app
            # defaults to 3000 via PORT; the chart standardizes on 3001).
            - name: PORT
              value: "3001"
            {{- if .Values.postgresql.enabled }}
            # Assembled in the admin Secret so the Postgres password is never in
            # plaintext Deployment env.
            - name: DATABASE_URL_SHIPWRIGHT_ADMIN
              valueFrom:
                secretKeyRef:
                  name: {{ include "shipwright.admin.secretName" . }}
                  key: DATABASE_URL_SHIPWRIGHT_ADMIN
            {{- else if and (not .Values.postgresql.enabled) (empty .Values.externalDatabase.existingSecret) }}
            {{- fail "externalDatabase.existingSecret is required when postgresql.enabled=false" }}
            {{- else if .Values.externalDatabase.existingSecret }}
            # Bring-your-own (external) Postgres: inject DATABASE_URL_SHIPWRIGHT_ADMIN
            # from a user-managed Secret. The chart neither assembles nor owns this
            # Secret, so the admin Secret stays free of any DB URL (no duplicate env).
            # adminUrlKey defaults to DATABASE_URL_SHIPWRIGHT_ADMIN when left empty.
            - name: DATABASE_URL_SHIPWRIGHT_ADMIN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalDatabase.existingSecret }}
                  key: {{ .Values.externalDatabase.adminUrlKey | default "DATABASE_URL_SHIPWRIGHT_ADMIN" }}
            {{- end }}
            {{- if .Values.admin.encryptionKeys.existingSecret }}
            # admin.encryptionKeys.existingSecret: source these two keys from a
            # caller-managed Secret so they survive across fresh namespace installs
            # without generating random values that can't decrypt existing data.
            - name: SHIPWRIGHT_SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.admin.encryptionKeys.existingSecret }}
                  key: {{ .Values.admin.encryptionKeys.sessionSecretRef | default "SHIPWRIGHT_SESSION_SECRET" }}
            - name: SHIPWRIGHT_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.admin.encryptionKeys.existingSecret }}
                  key: {{ .Values.admin.encryptionKeys.encryptionKeyRef | default "SHIPWRIGHT_ENCRYPTION_KEY" }}
            {{- else }}
            - name: SHIPWRIGHT_SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "shipwright.admin.secretName" . }}
                  key: SHIPWRIGHT_SESSION_SECRET
            - name: SHIPWRIGHT_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "shipwright.admin.secretName" . }}
                  key: SHIPWRIGHT_ENCRYPTION_KEY
            {{- end }}
            {{- if .Values.admin.appBaseUrl }}
            # admin.appBaseUrl: public host for OAuth redirect URIs so they use
            # the real hostname instead of localhost:3001 behind a Gateway.
            - name: SHIPWRIGHT_ADMIN_APP_BASE_URL
              value: {{ .Values.admin.appBaseUrl | quote }}
            {{- end }}
            {{- if .Values.admin.taskStorePublicUrl }}
            # admin.taskStorePublicUrl: externally-reachable task-store base URL
            # advertised in the mint-token env block (e.g. https://<host>/task-store
            # when taskStore.expose.enabled). Admin's own in-cluster task-store
            # calls keep using the internal SHIPWRIGHT_TASK_STORE_URL; when this is
            # unset the env block falls back to that internal URL.
            - name: SHIPWRIGHT_TASK_STORE_PUBLIC_URL
              value: {{ .Values.admin.taskStorePublicUrl | quote }}
            {{- end }}
            {{- if or (eq .Values.auth.mode "open") (eq .Values.auth.mode "none") }}
            # auth.mode=open (or deprecated alias "none") — dev auth, NO OAuth.
            # Insecure: do not expose publicly. NODE_ENV is intentionally NOT set
            # to production so the dev-auth path stays enabled.
            - name: ADMIN_DEV_AUTH
              value: "true"
            {{- else if eq .Values.auth.mode "google" }}
            # auth.mode=google — real Google OAuth. Production hardening on.
            - name: NODE_ENV
              value: "production"
            {{- if .Values.auth.google.existingSecret }}
            # auth.google.existingSecret: source all three OAuth vars from caller-managed Secret.
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.google.existingSecret }}
                  key: {{ .Values.auth.google.clientIdRef | default "GOOGLE_CLIENT_ID" }}
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.google.existingSecret }}
                  key: {{ .Values.auth.google.clientSecretRef | default "GOOGLE_CLIENT_SECRET" }}
            - name: SHIPWRIGHT_ADMIN_ALLOWED_EMAILS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.google.existingSecret }}
                  key: {{ .Values.auth.google.allowedEmailsRef | default "SHIPWRIGHT_ADMIN_ALLOWED_EMAILS" }}
            {{- else }}
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "shipwright.admin.secretName" . }}
                  key: GOOGLE_CLIENT_ID
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "shipwright.admin.secretName" . }}
                  key: GOOGLE_CLIENT_SECRET
            - name: SHIPWRIGHT_ADMIN_ALLOWED_EMAILS
              value: {{ .Values.auth.google.allowedEmails | quote }}
            {{- end }}
            {{- end }}
            {{- if .Values.agent.provisioning.enabled }}
            # ── Agent-provisioning env contract (HD-4.2) ──────────────────────
            # Injected ONLY when agent.provisioning.enabled. These are exactly the
            # vars admin/src/main.ts buildProvisioner reads — when absent (default),
            # main.ts returns a NoopAgentProvisioner (no cluster access). Do not add
            # vars main.ts ignores.
            - name: SHIPWRIGHT_K8S_PROVISIONING
              value: "enabled"
            # Namespace for provisioned agent resources. When agent.provisioning.namespace
            # is set, use the explicit value (cross-namespace provisioning). Otherwise
            # fall back to the downward API (pod's own release namespace = zero-config default).
            {{- if .Values.agent.provisioning.namespace }}
            - name: SHIPWRIGHT_K8S_NAMESPACE
              value: {{ .Values.agent.provisioning.namespace | quote }}
            {{- else }}
            - name: SHIPWRIGHT_K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            {{- end }}
            - name: SHIPWRIGHT_AGENT_IMAGE
              value: {{ .Values.agent.provisioning.image.repository | quote }}
            - name: SHIPWRIGHT_AGENT_IMAGE_TAG
              value: {{ .Values.agent.provisioning.image.tag | default .Chart.AppVersion | quote }}
            - name: SHIPWRIGHT_AGENT_REPLICAS
              value: {{ .Values.agent.provisioning.replicas | quote }}
            # In-cluster admin/gateway URL the provisioner hands to agent pods.
            # Defaults to the admin Service DNS name + port; override via
            # agent.provisioning.apiUrl for an external gateway.
            - name: SHIPWRIGHT_API_URL
              value: {{ .Values.agent.provisioning.apiUrl | default (printf "http://%s:%v" (include "shipwright.admin.fullname" .) .Values.admin.service.port) | quote }}
            {{- with .Values.agent.provisioning.pvcNameTemplate }}
            # PVC name template: when set, the provisioner substitutes {name} with
            # the agent's human-readable name (slug) to derive the PVC name. Used
            # when migrating from static agents with fixed naming conventions.
            - name: SHIPWRIGHT_AGENT_PVC_NAME_TEMPLATE
              value: {{ . | quote }}
            {{- end }}
            {{- end }}
            {{- if .Values.agent.voice.enabled }}
            # ── Agent-voice env contract (CV-1.1) ─────────────────────────────
            # Injected ONLY when agent.voice.enabled. admin/src/main.ts
            # buildProvisioner reads these and flows them into every provisioned
            # agent pod (agent/src/config.ts reads the same names). When voice is
            # disabled none of these render and provisioned pods keep the 3 base
            # vars only.
            {{- if eq .Values.agent.voice.provider "whisper" }}
            # provider=whisper → the in-cluster Whisper Service URL (POST /asr).
            - name: WHISPER_SERVICE_URL
              value: {{ include "shipwright.whisper.serviceUrl" . | quote }}
            {{- else if eq .Values.agent.voice.provider "groq" }}
            # provider=groq → GROQ_API_KEY sourced from the chart-managed voice
            # Secret so the key is never in plaintext Deployment env.
            {{- if .Values.agent.voice.groq.apiKey }}
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "shipwright.voice.secretName" . }}
                  key: GROQ_API_KEY
            {{- end }}
            {{- end }}
            # ElevenLabs TTS (both providers). Key via the voice Secret; the
            # optional voice id is non-secret plain env.
            {{- if .Values.agent.voice.elevenlabs.apiKey }}
            - name: ELEVENLABS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "shipwright.voice.secretName" . }}
                  key: ELEVENLABS_API_KEY
            {{- end }}
            {{- with .Values.agent.voice.elevenlabs.voiceId }}
            - name: ELEVENLABS_VOICE_ID
              value: {{ . | quote }}
            {{- end }}
            {{- end }}
            {{- if and .Values.chat.enabled .Values.chat.adminToken.existingSecret }}
            # ── Chat-service wiring ───────────────────────────────────────────
            # Enables the admin console's Chat tab (/admin/chat) and per-agent
            # chat-token minting during provisioning. The URL is the in-cluster
            # chat Service; the token is the same raw value the chat service
            # seeds at boot via CHAT_SEED_ADMIN_TOKEN, so the pair works out of
            # the box. Override the URL via admin.extraEnv if needed (extraEnv
            # is appended last and wins).
            - name: SHIPWRIGHT_CHAT_SERVICE_URL
              value: {{ printf "http://%s:%v" (include "shipwright.chat.fullname" .) .Values.chat.service.port | quote }}
            - name: SHIPWRIGHT_CHAT_SERVICE_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.chat.adminToken.existingSecret }}
                  key: {{ .Values.chat.adminToken.key | default "SHIPWRIGHT_CHAT_SERVICE_ADMIN_TOKEN" }}
            {{- end }}
            {{- if .Values.admin.sentry.dsn.existingSecret }}
            - name: SENTRY_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.admin.sentry.dsn.existingSecret }}
                  key: {{ .Values.admin.sentry.dsn.key | default "SENTRY_DSN" }}
            {{- end }}
            {{- if .Values.admin.sentry.environment }}
            - name: SENTRY_ENVIRONMENT
              value: {{ .Values.admin.sentry.environment | quote }}
            {{- end }}
            {{- with .Values.admin.extraEnv }}
            # admin.extraEnv: caller-supplied env vars appended last so they can
            # override anything above if needed.
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.admin.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- if .Values.cloudSqlProxy.enabled }}
        - name: cloud-sql-proxy
          image: {{ .Values.cloudSqlProxy.image }}
          args:
            - --private-ip
            - {{ required "cloudSqlProxy.connectionName is required when cloudSqlProxy.enabled=true" .Values.cloudSqlProxy.connectionName | quote }}
            {{- range .Values.cloudSqlProxy.args }}
            - {{ . | quote }}
            {{- end }}
          securityContext:
            runAsNonRoot: true
          {{- with .Values.cloudSqlProxy.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- end }}
{{- end }}
