{{- if .Values.metrics.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "shipwright.metrics.fullname" . }}
  labels:
    {{- include "shipwright.metrics.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.metrics.replicas | default 1 }}
  selector:
    matchLabels:
      {{- include "shipwright.metrics.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "shipwright.metrics.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "shipwright.metrics.serviceAccountName" . }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- range . }}
        - name: {{ . }}
        {{- end }}
      {{- end }}
      {{- if .Values.postgresql.enabled }}
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z {{ include "shipwright.postgresql.fullname" . }} 5432; do echo "waiting for postgresql..."; sleep 2; done']
      {{- end }}
      containers:
        - name: metrics
          image: "{{ with .Values.global.imageRegistry }}{{ . }}/{{ end }}{{ .Values.metrics.image.repository }}:{{ .Values.metrics.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.metrics.image.pullPolicy | default .Values.imagePullPolicy }}
          ports:
            - name: http
              containerPort: 3460
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: 3460
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3460
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          env:
            # Bind the metrics dashboard to the chart-standard port 3460.
            - name: METRICS_API_PORT
              value: "3460"
            # Signs/validates the dashboard session JWT. MUST match the admin's
            # SHIPWRIGHT_SESSION_SECRET so admin-minted sessions validate at the
            # metrics service when both sit behind a shared Gateway — otherwise the
            # dashboard's metrics view 401s. When metrics.sessionSecret.existingSecret
            # is set, source it from that caller-managed Secret (point it at the same
            # Secret the admin uses); otherwise use the chart-generated metrics Secret
            # (generate on first install, reuse on upgrade).
            {{- if .Values.metrics.sessionSecret.existingSecret }}
            - name: SHIPWRIGHT_SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.metrics.sessionSecret.existingSecret }}
                  key: {{ .Values.metrics.sessionSecret.sessionSecretRef | default "SHIPWRIGHT_SESSION_SECRET" }}
            {{- else }}
            - name: SHIPWRIGHT_SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "shipwright.metrics.secretName" . }}
                  key: SHIPWRIGHT_SESSION_SECRET
            {{- end }}
            {{- if .Values.postgresql.enabled }}
            # Assembled in the metrics Secret so the Postgres password is never in
            # plaintext Deployment env. Targets the bundled PostgreSQL in postgres
            # mode; the metrics provider bootstraps its own `events` table on boot
            # (no separate migration job needed) and the dashboard serves /dashboard.
            - name: METRICS_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "shipwright.metrics.secretName" . }}
                  key: METRICS_DATABASE_URL
            {{- end }}
            {{- if .Values.metrics.provider.posthog.existingSecret }}
            - name: POSTHOG_PERSONAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.metrics.provider.posthog.existingSecret }}
                  key: {{ .Values.metrics.provider.posthog.personalApiKeyRef }}
            - name: POSTHOG_PROJECT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.metrics.provider.posthog.existingSecret }}
                  key: {{ .Values.metrics.provider.posthog.projectIdRef }}
            {{- end }}
            {{- if .Values.metrics.provider.adminUrl }}
            - name: METRICS_ADMIN_URL
              value: {{ .Values.metrics.provider.adminUrl | quote }}
            {{- end }}
            # Task-store mode: when taskStoreUrl is set alongside adminUrl, the
            # metrics service selects TASKSTORE mode (TaskStoreProvider over the
            # task-store + admin APIs). Without it the selector falls through to
            # the local SQLite store, which has no writable path in this image and
            # crashes on boot (SQLITE_CANTOPEN). The token authenticates the
            # task-store HTTP client (METRICS_TASK_STORE_TOKEN).
            {{- if .Values.metrics.provider.taskStoreUrl }}
            - name: METRICS_TASK_STORE_URL
              value: {{ .Values.metrics.provider.taskStoreUrl | quote }}
            {{- end }}
            {{- if .Values.metrics.provider.taskStoreToken.existingSecret }}
            - name: METRICS_TASK_STORE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.metrics.provider.taskStoreToken.existingSecret }}
                  key: {{ .Values.metrics.provider.taskStoreToken.key }}
            {{- end }}
            {{- if .Values.metrics.provider.basePath }}
            - name: METRICS_BASE_PATH
              value: {{ .Values.metrics.provider.basePath | quote }}
            {{- end }}
            {{- if .Values.metrics.provider.requireOwnerRole }}
            - name: METRICS_REQUIRE_OWNER_ROLE
              value: "true"
            {{- end }}
            {{- if .Values.metrics.provider.internalKey.existingSecret }}
            - name: METRICS_INTERNAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.metrics.provider.internalKey.existingSecret }}
                  key: {{ .Values.metrics.provider.internalKey.key }}
            {{- end }}
          {{- with .Values.metrics.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
{{- end }}
