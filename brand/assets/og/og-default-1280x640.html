<!doctype html>
<!--
  Shipwright Harness — default social / OG card, fixed 1280×640 (BRAND.md §4).
  Generated from brand/templates/social-card.html. Screenshot the .og element
  at exactly 1280×640 to produce site/public/og-default-1280x640.png:

    cd brand/assets/og && (screenshot .og at 1280×640) -> og-default-1280x640.png

  Styling comes from brand/brand.css (no raw hexes). 80px safe margin (.pad).
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Shipwright Harness — OG</title>
    <link rel="stylesheet" href="../../brand.css" />
    <!-- Fonts to match the site: Space Grotesk + JetBrains Mono + General Sans. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://api.fontshare.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600&display=swap"
      rel="stylesheet"
    />
    <style>
      .og { position: relative; width: 1280px; height: 640px; overflow: hidden; background: var(--sw-color-bg-base); }
      .pad { position: relative; z-index: 1; padding: 80px; height: 100%; box-sizing: border-box; display: flex; flex-direction: column; justify-content: center; gap: 20px; }
      .og h1 { font-size: 72px; line-height: 1.05; max-width: 980px; }
      .og .sw-label { font-size: 20px; }
    </style>
  </head>
  <body>
    <div class="og">
      <div class="sw-orb sw-orb-brand" style="width: 560px; height: 560px; top: -160px; right: -120px;"></div>
      <div class="sw-orb sw-orb-support" style="width: 360px; height: 360px; bottom: -140px; left: -100px;"></div>
      <div class="pad">
        <p class="sw-label">Shipwright Harness · Built on Claude Code · MIT</p>
        <h1>The open-source autonomous <span class="sw-gradient-text">delivery agent</span> for Claude Code.</h1>
        <p class="sw-editorial" style="font-size: 26px;">Deploy it to your own cloud. Plan, build, review, ship — you own the pipeline.</p>
      </div>
    </div>
  </body>
</html>
